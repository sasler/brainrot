<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Generated by Gemini 3.1 Pro Engine -->
  <meta name="author" content="Gemini 3.1 Pro">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Maze</title>
    <style>
  /* Gemini 3.1 Pro Enhanced Aesthetics */
  body { background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%) !important; color: #fff; }
  canvas { box-shadow: 0 0 25px rgba(0, 255, 200, 0.4) !important; border-radius: 12px !important; transition: all 0.3s ease; }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff6600;
            font-size: 24px;
        }
        #message {
            position: absolute;
            color: #ff6600;
            font-size: 48px;
            text-align: center;
            display: none;
        }
        #message button {
            font-size: 24px;
            background-color: #ff6600;
            border: none;
            color: #050510;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">Time: <span id="timer">60</span></div>
    <canvas id="gameCanvas"></canvas>
    <div id="message">
        <span id="messageText"></span><br>
        <button id="restart">Restart</button>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const timerEl = document.getElementById('timer');
            const messageEl = document.getElementById('message');
            const messageTextEl = document.getElementById('messageText');
            const restartBtn = document.getElementById('restart');

            let width, height;
            let gameRunning = true;
            let timeLeft = 60;

            const mapWidth = 15;
            const mapHeight = 15;
            let map = [];

            const player = {
                x: 1.5,
                y: 1.5,
                dir: 0, // angle
                rot: 0, // rotation speed
                speed: 0, // movement speed
                moveSpeed: 0.05,
                rotSpeed: 0.03
            };

            const fov = Math.PI / 3;

            function generateMaze(w, h) {
                const maze = Array(h).fill(0).map(() => Array(w).fill(1));
                const stack = [];
                
                function carve(x, y) {
                    maze[y][x] = 0;
                    const directions = [[1, 0], [-1, 0], [0, 1], [0, -1]];
                    directions.sort(() => Math.random() - 0.5);

                    for (let [dx, dy] of directions) {
                        const nx = x + dx * 2;
                        const ny = y + dy * 2;
                        if (nx >= 0 && nx < w && ny >= 0 && ny < h && maze[ny][nx] === 1) {
                            maze[y + dy][x + dx] = 0;
                            carve(nx, ny);
                        }
                    }
                }
                carve(1, 1);
                maze[h - 2][w - 2] = 2; // Exit
                return maze;
            }

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            function init() {
                map = generateMaze(mapWidth, mapHeight);
                player.x = 1.5;
                player.y = 1.5;
                player.dir = 0;
                timeLeft = 60;
                gameRunning = true;
                messageEl.style.display = 'none';
                timerEl.textContent = timeLeft;
                countdown();
                loop();
            }

            function countdown() {
                if (!gameRunning) return;
                timeLeft--;
                timerEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame("Time's up!");
                } else {
                    setTimeout(countdown, 1000);
                }
            }

            function update() {
                if (!gameRunning) return;

                const newDir = player.dir + player.rot;
                player.dir = newDir;

                const moveStep = player.speed * player.moveSpeed;
                const newX = player.x + Math.cos(player.dir) * moveStep;
                const newY = player.y + Math.sin(player.dir) * moveStep;

                const mapX = Math.floor(newX);
                const mapY = Math.floor(newY);

                if (map[mapY] && map[mapY][mapX] === 0) {
                    player.x = newX;
                    player.y = newY;
                } else if (map[mapY] && map[mapY][mapX] === 2) {
                    endGame("You found the exit!");
                }
            }

            function draw() {
                // Raycasting
                for (let i = 0; i < width; i++) {
                    const rayAngle = (player.dir - fov / 2) + (i / width) * fov;
                    let distanceToWall = 0;
                    let hitWall = false;
                    let hitBoundary = false;

                    const eyeX = Math.cos(rayAngle);
                    const eyeY = Math.sin(rayAngle);

                    while (!hitWall && distanceToWall < 20) {
                        distanceToWall += 0.1;
                        const testX = Math.floor(player.x + eyeX * distanceToWall);
                        const testY = Math.floor(player.y + eyeY * distanceToWall);

                        if (testX < 0 || testX >= mapWidth || testY < 0 || testY >= mapHeight) {
                            hitWall = true;
                            distanceToWall = 20;
                        } else {
                            if (map[testY][testX] !== 0) {
                                hitWall = true;
                            }
                        }
                    }

                    const ceiling = height / 2 - height / distanceToWall;
                    const floor = height - ceiling;
                    
                    let wallColor = 150 - distanceToWall * 6;
                    if (map[Math.floor(player.y + eyeY * distanceToWall)][Math.floor(player.x + eyeX * distanceToWall)] === 2) {
                         ctx.fillStyle = `rgb(255, 102, 0)`;
                    } else {
                         ctx.fillStyle = `rgb(${wallColor}, ${wallColor * 0.4}, 0)`;
                    }
                    ctx.fillRect(i, ceiling, 1, floor - ceiling);
                }

                // Minimap
                const miniMapSize = 100;
                const miniMapX = width - miniMapSize - 20;
                const miniMapY = 20;
                const cellSize = miniMapSize / mapWidth;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(miniMapX, miniMapY, miniMapSize, miniMapSize);
                for (let y = 0; y < mapHeight; y++) {
                    for (let x = 0; x < mapWidth; x++) {
                        if (map[y][x] === 1) {
                            ctx.fillStyle = '#ff6600';
                            ctx.fillRect(miniMapX + x * cellSize, miniMapY + y * cellSize, cellSize, cellSize);
                        } else if (map[y][x] === 2) {
                            ctx.fillStyle = '#00ff00';
                            ctx.fillRect(miniMapX + x * cellSize, miniMapY + y * cellSize, cellSize, cellSize);
                        }
                    }
                }
                ctx.fillStyle = 'red';
                ctx.fillRect(miniMapX + player.x * cellSize - 1, miniMapY + player.y * cellSize - 1, 3, 3);


                // Fixed: single loop
            }
            
            function loop() {
                update();
                draw();
                if(gameRunning) requestAnimationFrame(loop);
            }

            function endGame(message) {
                gameRunning = false;
                messageTextEl.textContent = message;
                messageEl.style.display = 'block';
            }

            window.addEventListener('keydown', (e) => {
                switch (e.code) {
                    case 'KeyW': case 'ArrowUp': player.speed = 1; break;
                    case 'KeyS': case 'ArrowDown': player.speed = -1; break;
                    case 'KeyA': case 'ArrowLeft': player.rot = -1 * player.rotSpeed; break;
                    case 'KeyD': case 'ArrowRight': player.rot = 1 * player.rotSpeed; break;
                }
            });
            window.addEventListener('keyup', (e) => {
                 switch (e.code) {
                    case 'KeyW': case 'ArrowUp': case 'KeyS': case 'ArrowDown': player.speed = 0; break;
                    case 'KeyA': case 'ArrowLeft': case 'KeyD': case 'ArrowRight': player.rot = 0; break;
                }
            });
            window.addEventListener('resize', resize);
            restartBtn.addEventListener('click', init);

            resize();
            init();
        })();
    </script>
</body>
</html>
