<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Generated by Gemini 3.1 Pro Engine -->
  <meta name="author" content="Gemini 3.1 Pro">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Breakout</title>
    <style>
  /* Gemini 3.1 Pro Enhanced Aesthetics */
  body { background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%) !important; color: #fff; }
  canvas { box-shadow: 0 0 25px rgba(0, 255, 200, 0.4) !important; border-radius: 12px !important; transition: all 0.3s ease; }

        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050510;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            cursor: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            let paddle, ball, bricks, particles, powerUps, lasers;
            let score = 0;
            let lives = 3;
            let level = 1;
            let gameState = 'start'; // 'start', 'playing', 'levelComplete', 'gameOver'
            let ballOnPaddle = true;

            const PADDLE_WIDTH = 120;
            const PADDLE_HEIGHT = 20;
            const BALL_RADIUS = 10;
            const NEON_ORANGE = '#ff8c00';
            const NEON_BLUE = '#00BFFF';
            const NEON_PINK = '#FF00FF';
            const NEON_GREEN = '#39FF14';

            const brickColors = [NEON_GREEN, NEON_PINK, NEON_BLUE, NEON_ORANGE];
            const brickPoints = [10, 20, 30, 50];

            let keys = {
                right: false,
                left: false
            };

            function resizeCanvas() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            window.addEventListener('resize', () => {
                const oldWidth = width;
                const oldHeight = height;
                resizeCanvas();
                // Scale game objects
                paddle.x = paddle.x / oldWidth * width;
                ball.x = ball.x / oldWidth * width;
                ball.y = ball.y / oldHeight * height;
                bricks.forEach(brick => {
                    brick.x = brick.x / oldWidth * width;
                    brick.y = brick.y / oldHeight * height;
                    brick.w = width / 10;
                    brick.h = height * 0.04;
                });
            });

            function initGameObjects() {
                paddle = {
                    w: PADDLE_WIDTH,
                    h: PADDLE_HEIGHT,
                    x: width / 2 - PADDLE_WIDTH / 2,
                    y: height - 60,
                    speed: 8,
                    dx: 0,
                    glow: 10,
                    powerUp: null,
                    powerUpTimer: 0
                };
                ball = {
                    radius: BALL_RADIUS,
                    speed: 5,
                    dx: 0,
                    dy: 0,
                    glow: 15
                };
                resetBallAndPaddle();
                particles = [];
                powerUps = [];
                lasers = [];
            }

            function createBricks() {
                bricks = [];
                const brickRows = 4 + Math.min(level, 4); // More rows on higher levels
                const brickCols = 10;
                const brickWidth = width / brickCols;
                const brickHeight = height * 0.04;
                const brickGap = 2;

                for (let r = 0; r < brickRows; r++) {
                    for (let c = 0; c < brickCols; c++) {
                        bricks.push({
                            x: c * brickWidth + brickGap / 2,
                            y: r * brickHeight + brickGap / 2 + 50,
                            w: brickWidth - brickGap,
                            h: brickHeight - brickGap,
                            color: brickColors[r % brickColors.length],
                            points: brickPoints[r % brickPoints.length],
                            status: 1
                        });
                    }
                }
            }

            function resetBallAndPaddle() {
                ballOnPaddle = true;
                paddle.w = PADDLE_WIDTH;
                paddle.powerUp = null;
                paddle.powerUpTimer = 0;
                ball.x = paddle.x + paddle.w / 2;
                ball.y = paddle.y - ball.radius;
                ball.dx = 0;
                ball.dy = 0;
            }

            function launchBall() {
                if (ballOnPaddle) {
                    ballOnPaddle = false;
                    gameState = 'playing';
                    ball.speed = 5 + level * 0.5;
                    ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
                    ball.dy = -ball.speed;
                }
            }

            function createParticles(x, y, color) {
                for (let i = 0; i < 15; i++) {
                    particles.push({
                        x: x,
                        y: y,
                        radius: Math.random() * 3 + 1,
                        color: color,
                        dx: (Math.random() - 0.5) * 5,
                        dy: (Math.random() - 0.5) * 5,
                        life: 30
                    });
                }
            }
            
            function createPowerUp(x, y) {
                if (Math.random() < 0.2) { // 20% chance
                    const types = ['wide', 'slow', 'laser'];
                    const type = types[Math.floor(Math.random() * types.length)];
                    powerUps.push({ x, y, type, radius: 15, dy: 2 });
                }
            }

            function activatePowerUp(type) {
                paddle.powerUp = type;
                paddle.powerUpTimer = 500; // 500 frames
                if (type === 'wide') {
                    paddle.w = PADDLE_WIDTH * 1.5;
                } else if (type === 'slow') {
                    ball.speed = Math.max(3, ball.speed * 0.7);
                    ball.dx *= 0.7;
                    ball.dy *= 0.7;
                }
            }
            
            function shootLaser() {
                if (paddle.powerUp === 'laser' && paddle.powerUpTimer > 0) {
                    lasers.push({ x: paddle.x + 7, y: paddle.y, w: 6, h: 20, dy: -8 });
                    lasers.push({ x: paddle.x + paddle.w - 13, y: paddle.y, w: 6, h: 20, dy: -8 });
                }
            }

            function update() {
                if (gameState !== 'playing') return;

                // Paddle movement
                paddle.x += paddle.dx;
                if (keys.right) paddle.x += paddle.speed;
                if (keys.left) paddle.x -= paddle.speed;

                if (paddle.x < 0) paddle.x = 0;
                if (paddle.x + paddle.w > width) paddle.x = width - paddle.w;

                if (ballOnPaddle) {
                    ball.x = paddle.x + paddle.w / 2;
                    return;
                }

                // Ball movement
                ball.x += ball.dx;
                ball.y += ball.dy;

                // Wall collision
                if (ball.x + ball.radius > width || ball.x - ball.radius < 0) {
                    ball.dx *= -1;
                    createParticles(ball.x, ball.y, NEON_BLUE);
                }
                if (ball.y - ball.radius < 0) {
                    ball.dy *= -1;
                    createParticles(ball.x, ball.y, NEON_BLUE);
                }

                // Paddle collision
                if (ball.y + ball.radius > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                    let collidePoint = ball.x - (paddle.x + paddle.w / 2);
                    collidePoint = collidePoint / (paddle.w / 2); // Normalize to -1 to 1
                    let angle = collidePoint * (Math.PI / 3); // Max 60 degrees
                    
                    ball.dx = ball.speed * Math.sin(angle);
                    ball.dy = -ball.speed * Math.cos(angle);
                    ball.y = paddle.y - ball.radius;
                    createParticles(ball.x, ball.y, NEON_ORANGE);
                }

                // Brick collision
                let allBricksCleared = true;
                bricks.forEach(brick => {
                    if (brick.status === 1) {
                        allBricksCleared = false;
                        if (ball.x > brick.x && ball.x < brick.x + brick.w && ball.y > brick.y && ball.y < brick.y + brick.h) {
                            ball.dy *= -1;
                            brick.status = 0;
                            score += brick.points;
                            createParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color);
                            createPowerUp(brick.x + brick.w / 2, brick.y + brick.h / 2);
                        }
                    }
                });
                
                // Laser collision
for (let l_idx = lasers.length - 1; l_idx >= 0; l_idx--) {
    const laser = lasers[l_idx];
    laser.y += laser.dy;
    if (laser.y < 0) {
        lasers.splice(l_idx, 1);
        continue;
    }
    
    for (let b_idx = 0; b_idx < bricks.length; b_idx++) {
        const brick = bricks[b_idx];
        if (brick.status === 1 && laser.x > brick.x && laser.x < brick.x + brick.w && laser.y > brick.y && laser.y < brick.y + brick.h) {
            brick.status = 0;
            score += brick.points;
            createParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color);
            createPowerUp(brick.x + brick.w / 2, brick.y + brick.h / 2);
            lasers.splice(l_idx, 1);
            break;
        }
    }
}

// Power-up movement and collection
for (let index = powerUps.length - 1; index >= 0; index--) {
    const p = powerUps[index];
    p.y += p.dy;
    if (p.y > height) {
        powerUps.splice(index, 1);
        continue;
    }
    if (p.x > paddle.x && p.x < paddle.x + paddle.w && p.y > paddle.y && p.y < paddle.y + paddle.h) {
        activatePowerUp(p.type);
        powerUps.splice(index, 1);
    }
}
                ctx.shadowColor = NEON_PINK;
                ctx.shadowBlur = 15;
                ctx.fillStyle = NEON_PINK;
                lasers.forEach(laser => {
                    ctx.fillRect(laser.x, laser.y, laser.w, laser.h);
                });

                // Draw particles
                ctx.shadowBlur = 0;
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.closePath();
                });
                
                // Draw power-ups
                powerUps.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.shadowBlur = 15;
                    if (p.type === 'wide') ctx.shadowColor = NEON_ORANGE;
                    if (p.type === 'slow') ctx.shadowColor = NEON_GREEN;
                    if (p.type === 'laser') ctx.shadowColor = NEON_PINK;
                    ctx.fillStyle = ctx.shadowColor;
                    ctx.fill();
                    ctx.closePath();
                    ctx.fillStyle = '#050510';
                    ctx.font = 'bold 18px Courier New';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(p.type.charAt(0).toUpperCase(), p.x, p.y);
                });

                // Reset shadow
                ctx.shadowBlur = 0;

                // Draw UI
                ctx.fillStyle = '#fff';
                ctx.font = '24px Courier New';
                ctx.textAlign = 'left';
                ctx.fillText('Score: ' + score, 10, 30);
                ctx.textAlign = 'right';
                ctx.fillText('Lives: ' + lives, width - 10, 30);
                ctx.textAlign = 'center';
                ctx.fillText('Level: ' + level, width / 2, 30);

                if (gameState === 'start') {
                    ctx.font = '30px Courier New';
                    ctx.fillStyle = '#fff';
                    ctx.fillText('Click or Press Space to Launch', width / 2, height / 2);
                    ctx.font = '20px Courier New';
                    ctx.fillText('Use Mouse or Arrow Keys to Move', width / 2, height / 2 + 40);
                } else if (gameState === 'levelComplete') {
                    ctx.font = '40px Courier New';
                    ctx.fillStyle = NEON_GREEN;
                    ctx.fillText('LEVEL ' + (level -1) + ' COMPLETE', width / 2, height / 2);
                } else if (gameState === 'gameOver') {
                    ctx.font = '50px Courier New';
                    ctx.fillStyle = 'red';
                    ctx.fillText('GAME OVER', width / 2, height / 2);
                    ctx.font = '30px Courier New';
                    ctx.fillText('Final Score: ' + score, width / 2, height / 2 + 50);
                }
            }

            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            // Event Listeners
            document.addEventListener('keydown', e => {
                if (e.key === 'Right' || e.key === 'ArrowRight') keys.right = true;
                if (e.key === 'Left' || e.key === 'ArrowLeft') keys.left = true;
                if (e.code === 'Space') {
                    if (gameState === 'start') launchBall();
                    if (paddle.powerUp === 'laser') shootLaser();
                }
            });

            document.addEventListener('keyup', e => {
                if (e.key === 'Right' || e.key === 'ArrowRight') keys.right = false;
                if (e.key === 'Left' || e.key === 'ArrowLeft') keys.left = false;
            });

            document.addEventListener('mousemove', e => {
                let relativeX = e.clientX - canvas.getBoundingClientRect().left;
                if (relativeX > 0 && relativeX < width) {
                    paddle.x = relativeX - paddle.w / 2;
                }
            });
            
            document.addEventListener('click', () => {
                if (gameState === 'start') {
                    launchBall();
                } else if (paddle.powerUp === 'laser') {
                    shootLaser();
                }
            });

            // Initialization
            resizeCanvas();
            initGameObjects();
            createBricks();
            gameLoop();
        })();
    </script>
</body>
</html>
