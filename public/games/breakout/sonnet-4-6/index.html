<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout · BrainRot Games</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050510;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e0e8ff;
    user-select: none;
  }

  canvas { display: block; }

  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    background: rgba(5, 5, 16, 0.92);
    backdrop-filter: blur(6px);
    transition: opacity 0.4s ease;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .title {
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #00e5ff;
    text-shadow:
      0 0 20px rgba(0, 229, 255, 0.5),
      0 0 60px rgba(0, 229, 255, 0.2);
    margin-bottom: 0.2em;
  }

  .subtitle {
    font-size: clamp(0.75rem, 2vw, 1rem);
    color: #5a7aaa;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 2.5em;
  }

  .score-display {
    font-size: clamp(1.2rem, 3vw, 2rem);
    color: #00e5ff;
    margin-bottom: 0.3em;
    font-weight: 700;
    text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
  }

  .level-display {
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    color: #4a90d9;
    margin-bottom: 2em;
  }

  .btn {
    padding: 0.8em 2.5em;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #050510;
    background: #00e5ff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
  }

  .btn:hover {
    background: #40efff;
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0);
  }

  .controls-hint {
    margin-top: 2em;
    font-size: 0.75rem;
    color: #3a5580;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="overlay" id="startScreen">
  <div class="title">Breakout</div>
  <div class="subtitle">BrainRot Games</div>
  <button class="btn" id="startBtn">Start Game</button>
  <div class="controls-hint">Arrow Keys or Mouse to move · Space to launch</div>
</div>

<div class="overlay hidden" id="gameOverScreen">
  <div class="title" style="font-size: clamp(1.8rem, 5vw, 3.5rem);">Game Over</div>
  <div class="score-display" id="finalScore">0</div>
  <div class="level-display" id="finalLevel">Level 1</div>
  <button class="btn" id="restartBtn">Play Again</button>
</div>

<div class="overlay hidden" id="winScreen">
  <div class="title" style="font-size: clamp(1.8rem, 5vw, 3.5rem);">You Win!</div>
  <div class="score-display" id="winScore">0</div>
  <div class="level-display" id="winLevel">Level 1</div>
  <button class="btn" id="winRestartBtn">Play Again</button>
</div>

<script>
// ── Canvas Setup ──────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Design dimensions (game logic runs at this resolution)
const DESIGN_W = 800;
const DESIGN_H = 600;

let scale = 1;
let offsetX = 0;
let offsetY = 0;

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  scale = Math.min(w / DESIGN_W, h / DESIGN_H);
  canvas.width = DESIGN_W * scale;
  canvas.height = DESIGN_H * scale;
  offsetX = (w - canvas.width) / 2;
  offsetY = (h - canvas.height) / 2;
  canvas.style.position = 'absolute';
  canvas.style.left = offsetX + 'px';
  canvas.style.top = offsetY + 'px';
}

window.addEventListener('resize', resize);
resize();

// ── Game Constants ────────────────────────────────────────────
const PADDLE_W = 100;
const PADDLE_H = 14;
const PADDLE_Y = DESIGN_H - 40;
const PADDLE_SPEED = 8;
const PADDLE_RADIUS = 4;

const BALL_RADIUS = 6;
const BALL_BASE_SPEED = 5;

const BRICK_ROWS = 6;
const BRICK_COLS = 10;
const BRICK_W = 64;
const BRICK_H = 20;
const BRICK_PAD = 4;
const BRICK_TOP = 60;
const BRICK_LEFT = (DESIGN_W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;

const MAX_LEVEL = 5;

// Row colors — cyan/blue neon palette
const ROW_COLORS = [
  '#ff3a6e', // top row - pink accent
  '#ff8a3a', // orange
  '#ffe03a', // yellow
  '#3aff8a', // green
  '#3ae5ff', // cyan
  '#3a7aff', // blue
];

const ROW_GLOW = [
  'rgba(255, 58, 110, 0.5)',
  'rgba(255, 138, 58, 0.5)',
  'rgba(255, 224, 58, 0.5)',
  'rgba(58, 255, 138, 0.5)',
  'rgba(58, 229, 255, 0.5)',
  'rgba(58, 122, 255, 0.5)',
];

// Points per row (top rows worth more)
const ROW_POINTS = [60, 50, 40, 30, 20, 10];

// ── Game State ────────────────────────────────────────────────
let state = 'start'; // start | playing | paused | gameover | win
let score = 0;
let lives = 3;
let level = 1;
let ballSpeedMultiplier = 1;

let paddle = { x: DESIGN_W / 2 - PADDLE_W / 2, w: PADDLE_W };
let ball = { x: 0, y: 0, dx: 0, dy: 0, attached: true };
let bricks = [];
let particles = [];
let shakeTimer = 0;

// Input
let keys = {};
let mouseX = null;

// ── Brick Generation ──────────────────────────────────────────
function createBricks() {
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      // Higher levels add tougher bricks (hit points)
      let hp = 1;
      if (level >= 3 && r <= 1) hp = 2;
      if (level >= 5 && r === 0) hp = 3;

      bricks.push({
        x: BRICK_LEFT + c * (BRICK_W + BRICK_PAD),
        y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W,
        h: BRICK_H,
        row: r,
        hp: hp,
        maxHp: hp,
        alive: true,
      });
    }
  }
}

// ── Ball Reset ────────────────────────────────────────────────
function resetBall() {
  ball.attached = true;
  ball.x = paddle.x + paddle.w / 2;
  ball.y = PADDLE_Y - BALL_RADIUS - 1;
  ball.dx = 0;
  ball.dy = 0;
}

function launchBall() {
  if (!ball.attached) return;
  ball.attached = false;
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
  const speed = BALL_BASE_SPEED * ballSpeedMultiplier;
  ball.dx = Math.cos(angle) * speed;
  ball.dy = Math.sin(angle) * speed;
}

// ── Particles ─────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      color,
      size: 2 + Math.random() * 3,
    });
  }
}

// ── Game Init ─────────────────────────────────────────────────
function initGame() {
  score = 0;
  lives = 3;
  level = 1;
  ballSpeedMultiplier = 1;
  paddle.x = DESIGN_W / 2 - PADDLE_W / 2;
  paddle.w = PADDLE_W;
  createBricks();
  resetBall();
  particles = [];
  shakeTimer = 0;
}

function nextLevel() {
  level++;
  if (level > MAX_LEVEL) {
    state = 'win';
    document.getElementById('winScore').textContent = score;
    document.getElementById('winLevel').textContent = 'Cleared all ' + MAX_LEVEL + ' levels!';
    document.getElementById('winScreen').classList.remove('hidden');
    return;
  }
  ballSpeedMultiplier = 1 + (level - 1) * 0.12;
  createBricks();
  resetBall();
}

// ── Input Handling ────────────────────────────────────────────
window.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (e.key === ' ' && state === 'playing') {
    e.preventDefault();
    launchBall();
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.key] = false;
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / scale;
});

canvas.addEventListener('click', () => {
  if (state === 'playing') launchBall();
});

// ── UI Buttons ────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startScreen').classList.add('hidden');
  state = 'playing';
  initGame();
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('gameOverScreen').classList.add('hidden');
  state = 'playing';
  initGame();
});

document.getElementById('winRestartBtn').addEventListener('click', () => {
  document.getElementById('winScreen').classList.add('hidden');
  state = 'playing';
  initGame();
});

// ── Update ────────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;

  // Paddle movement — keyboard
  if (keys['ArrowLeft'] || keys['a']) paddle.x -= PADDLE_SPEED;
  if (keys['ArrowRight'] || keys['d']) paddle.x += PADDLE_SPEED;

  // Paddle movement — mouse
  if (mouseX !== null) {
    const target = mouseX - paddle.w / 2;
    const diff = target - paddle.x;
    paddle.x += diff * 0.3; // smooth follow
  }

  // Clamp paddle
  paddle.x = Math.max(0, Math.min(DESIGN_W - paddle.w, paddle.x));

  // Ball follows paddle when attached
  if (ball.attached) {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = PADDLE_Y - BALL_RADIUS - 1;
    return;
  }

  // Move ball
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall collisions
  if (ball.x - BALL_RADIUS <= 0) {
    ball.x = BALL_RADIUS;
    ball.dx = Math.abs(ball.dx);
  }
  if (ball.x + BALL_RADIUS >= DESIGN_W) {
    ball.x = DESIGN_W - BALL_RADIUS;
    ball.dx = -Math.abs(ball.dx);
  }
  if (ball.y - BALL_RADIUS <= 0) {
    ball.y = BALL_RADIUS;
    ball.dy = Math.abs(ball.dy);
  }

  // Bottom — lose life
  if (ball.y + BALL_RADIUS >= DESIGN_H) {
    lives--;
    shakeTimer = 12;
    spawnParticles(ball.x, DESIGN_H, '#ff3a6e', 15);
    if (lives <= 0) {
      state = 'gameover';
      document.getElementById('finalScore').textContent = score;
      document.getElementById('finalLevel').textContent = 'Reached Level ' + level;
      document.getElementById('gameOverScreen').classList.remove('hidden');
      return;
    }
    resetBall();
    return;
  }

  // Paddle collision
  if (
    ball.dy > 0 &&
    ball.y + BALL_RADIUS >= PADDLE_Y &&
    ball.y + BALL_RADIUS <= PADDLE_Y + PADDLE_H + 4 &&
    ball.x >= paddle.x - BALL_RADIUS &&
    ball.x <= paddle.x + paddle.w + BALL_RADIUS
  ) {
    // Hit position: -1 (left edge) to 1 (right edge)
    const hitPos = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
    const clampedHit = Math.max(-0.9, Math.min(0.9, hitPos));

    // Angle based on hit position: -75° to -105° (upward range)
    const angle = clampedHit * (Math.PI / 3) - Math.PI / 2;
    const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);

    ball.dx = Math.cos(angle) * speed;
    ball.dy = Math.sin(angle) * speed;
    ball.y = PADDLE_Y - BALL_RADIUS - 1;

    spawnParticles(ball.x, PADDLE_Y, '#00e5ff', 5);
  }

  // Brick collisions
  for (const brick of bricks) {
    if (!brick.alive) continue;

    // AABB check
    const bx = Math.max(brick.x, Math.min(ball.x, brick.x + brick.w));
    const by = Math.max(brick.y, Math.min(ball.y, brick.y + brick.h));
    const distX = ball.x - bx;
    const distY = ball.y - by;

    if (distX * distX + distY * distY <= BALL_RADIUS * BALL_RADIUS) {
      // Determine bounce direction
      const overlapLeft = ball.x + BALL_RADIUS - brick.x;
      const overlapRight = brick.x + brick.w - (ball.x - BALL_RADIUS);
      const overlapTop = ball.y + BALL_RADIUS - brick.y;
      const overlapBottom = brick.y + brick.h - (ball.y - BALL_RADIUS);

      const minOverlapX = Math.min(overlapLeft, overlapRight);
      const minOverlapY = Math.min(overlapTop, overlapBottom);

      if (minOverlapX < minOverlapY) {
        ball.dx = -ball.dx;
      } else {
        ball.dy = -ball.dy;
      }

      brick.hp--;
      if (brick.hp <= 0) {
        brick.alive = false;
        score += ROW_POINTS[brick.row] * level;
        spawnParticles(
          brick.x + brick.w / 2,
          brick.y + brick.h / 2,
          ROW_COLORS[brick.row],
          10
        );
      } else {
        spawnParticles(
          brick.x + brick.w / 2,
          brick.y + brick.h / 2,
          ROW_COLORS[brick.row],
          4
        );
      }

      break; // one brick per frame
    }
  }

  // Check level clear
  if (bricks.every(b => !b.alive)) {
    nextLevel();
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.dx;
    p.y += p.dy;
    p.dy += 0.05; // gravity
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Shake decay
  if (shakeTimer > 0) shakeTimer--;
}

// ── Render ────────────────────────────────────────────────────
function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function render() {
  ctx.save();
  ctx.scale(scale, scale);

  // Screen shake
  if (shakeTimer > 0) {
    const intensity = shakeTimer * 0.5;
    ctx.translate(
      (Math.random() - 0.5) * intensity,
      (Math.random() - 0.5) * intensity
    );
  }

  // Background
  ctx.fillStyle = '#050510';
  ctx.fillRect(-10, -10, DESIGN_W + 20, DESIGN_H + 20);

  // Subtle grid
  ctx.strokeStyle = 'rgba(30, 60, 100, 0.08)';
  ctx.lineWidth = 1;
  const gridSize = 40;
  for (let x = 0; x <= DESIGN_W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, DESIGN_H);
    ctx.stroke();
  }
  for (let y = 0; y <= DESIGN_H; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(DESIGN_W, y);
    ctx.stroke();
  }

  if (state === 'playing' || state === 'gameover' || state === 'win') {
    // Bricks
    for (const brick of bricks) {
      if (!brick.alive) continue;

      const color = ROW_COLORS[brick.row];
      const glow = ROW_GLOW[brick.row];

      // Dimmer for damaged bricks
      const alpha = 0.4 + 0.6 * (brick.hp / brick.maxHp);

      ctx.globalAlpha = alpha;

      // Glow
      ctx.shadowColor = glow;
      ctx.shadowBlur = 8;

      drawRoundedRect(brick.x, brick.y, brick.w, brick.h, 3);
      ctx.fillStyle = color;
      ctx.fill();

      // Inner highlight
      ctx.shadowBlur = 0;
      const grad = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.h);
      grad.addColorStop(0, 'rgba(255, 255, 255, 0.2)');
      grad.addColorStop(1, 'rgba(0, 0, 0, 0.1)');
      ctx.fillStyle = grad;
      ctx.fill();

      // HP indicator for multi-hit bricks
      if (brick.maxHp > 1) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(brick.hp.toString(), brick.x + brick.w / 2, brick.y + brick.h / 2);
      }

      ctx.globalAlpha = 1;
    }

    ctx.shadowBlur = 0;

    // Paddle
    ctx.shadowColor = 'rgba(0, 229, 255, 0.6)';
    ctx.shadowBlur = 12;
    drawRoundedRect(paddle.x, PADDLE_Y, paddle.w, PADDLE_H, PADDLE_RADIUS);
    const paddleGrad = ctx.createLinearGradient(paddle.x, PADDLE_Y, paddle.x, PADDLE_Y + PADDLE_H);
    paddleGrad.addColorStop(0, '#40efff');
    paddleGrad.addColorStop(1, '#0099cc');
    ctx.fillStyle = paddleGrad;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Ball
    ctx.shadowColor = 'rgba(0, 229, 255, 0.8)';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.shadowBlur = 0;

    // Ball trail (subtle)
    if (!ball.attached) {
      ctx.beginPath();
      ctx.arc(ball.x - ball.dx * 0.5, ball.y - ball.dy * 0.5, BALL_RADIUS * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0, 229, 255, 0.3)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ball.x - ball.dx, ball.y - ball.dy, BALL_RADIUS * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0, 229, 255, 0.15)';
      ctx.fill();
    }

    // Particles
    for (const p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // HUD
    ctx.fillStyle = '#00e5ff';
    ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('SCORE  ' + score, 15, 12);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#4a90d9';
    ctx.font = '14px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('LEVEL ' + level, DESIGN_W / 2, 14);

    // Lives as circles
    ctx.textAlign = 'right';
    for (let i = 0; i < lives; i++) {
      ctx.beginPath();
      ctx.arc(DESIGN_W - 20 - i * 22, 22, 7, 0, Math.PI * 2);
      ctx.fillStyle = i === 0 ? '#00e5ff' : '#1a5a80';
      ctx.fill();
      ctx.strokeStyle = '#00e5ff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Launch hint
    if (ball.attached) {
      ctx.fillStyle = 'rgba(0, 229, 255, 0.5)';
      ctx.font = '14px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Click or press Space to launch', DESIGN_W / 2, PADDLE_Y - 40);
    }
  }

  ctx.restore();
}

// ── Game Loop ─────────────────────────────────────────────────
let lastTime = 0;
let accumulator = 0;
const TICK = 1000 / 60;

function gameLoop(timestamp) {
  const delta = timestamp - lastTime;
  lastTime = timestamp;
  accumulator += Math.min(delta, 100); // cap large gaps

  while (accumulator >= TICK) {
    update();
    accumulator -= TICK;
  }

  render();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame((ts) => {
  lastTime = ts;
  gameLoop(ts);
});
</script>
</body>
</html>
