<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Generated by Gemini 3.1 Pro Engine -->
  <meta name="author" content="Gemini 3.1 Pro">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake · BrainRot Games</title>
<style>
  /* Gemini 3.1 Pro Enhanced Aesthetics */
  body { background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%) !important; color: #fff; }
  canvas { box-shadow: 0 0 25px rgba(0, 255, 200, 0.4) !important; border-radius: 12px !important; transition: all 0.3s ease; }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100vw;height:100vh;overflow:hidden;background:#050510;font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;touch-action:none;color:#fff;}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}
  #muteBtn{position:fixed;top:12px;right:12px;z-index:10;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;width:40px;height:40px;font-size:20px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center}
  #muteBtn:hover{background:rgba(255,255,255,0.15)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="muteBtn" title="Toggle sound">🔊</button>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const muteBtn = document.getElementById('muteBtn');

  const ACCENT_COLOR = '#00ff88';
  const BG_COLOR = '#050510';
  const GRID_SIZE = 20;

  let snake, food, score, direction, nextDirection, speed, gameState, audioCtx, sounds, muted;
  let touchStartX, touchStartY;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    sounds = {
      eat: createSound(1, 440, 0.1, 'square'),
      gameOver: createSound(2, [160, 120, 80], 0.15, 'sawtooth'),
      start: createSound(1, 220, 0.1, 'sine')
    };
    muted = false;
  }

  function createSound(count, freq, duration, type) {
    return () => {
      if (!audioCtx || muted) return;
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = type;

      const now = audioCtx.currentTime;
      gain.gain.setValueAtTime(0, now);
      
      if (Array.isArray(freq)) {
        freq.forEach((f, i) => {
          gain.gain.linearRampToValueAtTime(0.1, now + i * duration);
          osc.frequency.setValueAtTime(f, now + i * duration);
          gain.gain.linearRampToValueAtTime(0, now + (i + 0.9) * duration);
        });
      } else {
        gain.gain.linearRampToValueAtTime(0.1, now + 0.01);
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.linearRampToValueAtTime(0, now + duration);
      }
      
      osc.start(now);
      osc.stop(now + count * duration);
    };
  }

  function toggleMute() {
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
  }

  function initGame() {
    snake = [{ x: 10, y: 10 }];
    direction = { x: 0, y: 0 };
    nextDirection = { x: 0, y: 0 };
    score = 0;
    speed = 125;
    spawnFood();
    gameState = 'start';
  }

  function spawnFood() {
    const cols = Math.floor(canvas.width / GRID_SIZE);
    const rows = Math.floor(canvas.height / GRID_SIZE);
    while (true) {
      food = {
        x: Math.floor(Math.random() * cols),
        y: Math.floor(Math.random() * rows)
      };
      if (!snake.some(segment => segment.x === food.x && segment.y === food.y)) {
        break;
      }
    }
  }

  function update() {
    if (gameState !== 'playing') return;

    direction = nextDirection;
    const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

    const cols = Math.floor(canvas.width / GRID_SIZE);
    const rows = Math.floor(canvas.height / GRID_SIZE);

    // Wall collision
    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
      gameState = 'gameOver';
      sounds.gameOver();
      return;
    }

    // Self collision
    for (let i = 1; i < snake.length; i++) {
      if (head.x === snake[i].x && head.y === snake[i].y) {
        gameState = 'gameOver';
        sounds.gameOver();
        return;
      }
    }

    snake.unshift(head);

    // Eat food
    if (head.x === food.x && head.y === food.y) {
      score++;
      speed = Math.max(50, 125 - score * 2.5);
      sounds.eat();
      spawnFood();
    } else {
      snake.pop();
    }
  }

  function draw() {
    ctx.fillStyle = BG_COLOR;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (gameState === 'start') {
      drawStartScreen();
    } else if (gameState === 'gameOver') {
      drawGameOverScreen();
    } else {
      drawGame();
    }

    requestAnimationFrame(draw);
  }
  
  function drawGame() {
    // Draw food
    ctx.fillStyle = ACCENT_COLOR;
    ctx.shadowColor = ACCENT_COLOR;
    ctx.shadowBlur = 15;
    ctx.fillRect(food.x * GRID_SIZE, food.y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
    ctx.shadowBlur = 0;

    // Draw snake
    snake.forEach((segment, index) => {
      ctx.fillStyle = index === 0 ? ACCENT_COLOR : `rgba(0, 255, 136, ${1 - index / snake.length * 0.5})`;
      ctx.fillRect(segment.x * GRID_SIZE, segment.y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
      if (index === 0) {
        ctx.strokeStyle = BG_COLOR;
        ctx.lineWidth = 2;
        ctx.strokeRect(segment.x * GRID_SIZE, segment.y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
      }
    });

    // Draw score
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.font = '24px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`Score: ${score}`, 10, 30);
  }

  function drawStartScreen() {
    drawText('SNAKE', 80, canvas.height / 2 - 100, true);
    drawText('Use Arrow Keys or WASD to move', 24, canvas.height / 2);
    drawText('Swipe on mobile', 20, canvas.height / 2 + 40);
    drawText('Press any key or tap to start', 22, canvas.height / 2 + 100);
  }

  function drawGameOverScreen() {
    drawText('GAME OVER', 70, canvas.height / 2 - 80, true);
    drawText(`Final Score: ${score}`, 30, canvas.height / 2);
    drawText('Press any key or tap to restart', 22, canvas.height / 2 + 60);
  }

  function drawText(text, size, y, isTitle = false) {
    ctx.font = `bold ${size}px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    if (isTitle) {
      ctx.fillStyle = ACCENT_COLOR;
      ctx.shadowColor = ACCENT_COLOR;
      ctx.shadowBlur = 20;
    } else {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.shadowColor = 'transparent';
    }
    ctx.fillText(text, canvas.width / 2, y);
    ctx.shadowBlur = 0;
  }

  function handleKeydown(e) {
    if (gameState === 'playing') {
      const key = e.key.toLowerCase();
      if ((key === 'arrowup' || key === 'w') && direction.y === 0) nextDirection = { x: 0, y: -1 };
      else if ((key === 'arrowdown' || key === 's') && direction.y === 0) nextDirection = { x: 0, y: 1 };
      else if ((key === 'arrowleft' || key === 'a') && direction.x === 0) nextDirection = { x: -1, y: 0 };
      else if ((key === 'arrowright' || key === 'd') && direction.x === 0) nextDirection = { x: 1, y: 0 };
    } else {
      initAudio();
      sounds.start();
      initGame();
      gameState = 'playing';
      nextDirection = { x: 1, y: 0 }; // Start moving right
    }
  }

  function handleTouchStart(e) {
    if (e.touches.length === 1) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }
  }

  function handleTouchEnd(e) {
    if (gameState !== 'playing') {
      initAudio();
      sounds.start();
      initGame();
      gameState = 'playing';
      nextDirection = { x: 1, y: 0 };
      return;
    }
    
    if (touchStartX == null || touchStartY == null || e.changedTouches.length === 0) return;

    const touchEndX = e.changedTouches[0].clientX;
    const touchEndY = e.changedTouches[0].clientY;
    const dx = touchEndX - touchStartX;
    const dy = touchEndY - touchStartY;

    if (Math.abs(dx) > Math.abs(dy)) { // Horizontal swipe
      if (dx > 30 && direction.x === 0) nextDirection = { x: 1, y: 0 };
      else if (dx < -30 && direction.x === 0) nextDirection = { x: -1, y: 0 };
    } else { // Vertical swipe
      if (dy > 30 && direction.y === 0) nextDirection = { x: 0, y: 1 };
      else if (dy < -30 && direction.y === 0) nextDirection = { x: 0, y: -1 };
    }
    touchStartX = null;
    touchStartY = null;
  }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    canvas.height = window.innerHeight * dpr;
    ctx.scale(dpr, dpr);
    // Adjust canvas style size
    canvas.style.width = `${window.innerWidth}px`;
    canvas.style.height = `${window.innerHeight}px`;
    
    // Re-center game elements if needed
    if (gameState !== 'playing') {
        draw();
    }
  }

  function gameLoop() {
    update();
    setTimeout(gameLoop, speed);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('keydown', handleKeydown);
  window.addEventListener('touchstart', handleTouchStart, { passive: false });
  window.addEventListener('touchend', handleTouchEnd, { passive: false });
  muteBtn.addEventListener('click', () => {
    initAudio();
    toggleMute();
  });

  initGame();
  resize();
  requestAnimationFrame(draw);
  gameLoop();

})();
</script>
</body>
</html>
