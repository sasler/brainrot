<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Generated by Gemini 3.1 Pro Engine -->
  <meta name="author" content="Gemini 3.1 Pro">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetris</title>
    <style>
  /* Gemini 3.1 Pro Enhanced Aesthetics */
  body { background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%) !important; color: #fff; }
  canvas { box-shadow: 0 0 25px rgba(0, 255, 200, 0.4) !important; border-radius: 12px !important; transition: all 0.3s ease; }

        :root {
            --primary-neon: #00ccff;
            --dark-bg: #050510;
            --text-color: #f0f0f0;
            --border-glow: 0 0 5px '#00ccff', 0 0 10px '#00ccff', 0 0 15px '#00ccff';
            --text-glow: 0 0 3px '#00ccff', 0 0 5px #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: '#12121a';
            color: var(--text-color);
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
        }

        #game-canvas {
            border: 2px solid '#00ccff';
            box-shadow: var(--border-glow);
        }

        .ui-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 180px;
        }

        .ui-box {
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid '#00ccff';
            padding: 15px;
            text-align: center;
            box-shadow: inset 0 0 8px rgba(0, 204, 255, 0.5);
        }

        .ui-box h2 {
            font-size: 1.2em;
            color: '#00ccff';
            text-shadow: var(--text-glow);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .ui-box p {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        #next-canvas, #hold-canvas {
            width: 100%;
            height: 120px;
            background-color: transparent;
        }

        #game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 16, 0.85);
            display: none; /* Initially hidden */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
        }

        #game-over-box {
            padding: 40px;
            border: 2px solid '#00ccff';
            box-shadow: var(--border-glow);
            background-color: '#12121a';
        }

        #game-over-box h1 {
            font-size: 3em;
            color: '#00ccff';
            text-shadow: var(--text-glow);
            margin-bottom: 20px;
        }

        #game-over-box p {
            font-size: 1.5em;
            margin-bottom: 30px;
        }

        #restart-button {
            padding: 15px 30px;
            font-size: 1.2em;
            color: '#12121a';
            background-color: '#00ccff';
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: var(--border-glow);
            transition: all 0.2s ease;
        }

        #restart-button:hover {
            background-color: #fff;
            color: #000;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px '#00ccff';
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="ui-panel">
            <div class="ui-box">
                <h2>Hold</h2>
                <canvas id="hold-canvas"></canvas>
            </div>
             <div class="ui-box">
                <h2>Score</h2>
                <p id="score">0</p>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>

        <div class="ui-panel">
            <div class="ui-box">
                <h2>Next</h2>
                <canvas id="next-canvas"></canvas>
            </div>
            <div class="ui-box">
                <h2>Level</h2>
                <p id="level">1</p>
            </div>
            <div class="ui-box">
                <h2>Lines</h2>
                <p id="lines">0</p>
            </div>
        </div>
    </div>

    <div id="game-over-overlay">
        <div id="game-over-box">
            <h1>Game Over</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-button">Restart</button>
        </div>
    </div>

    <script>
    (function() {
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-canvas');
        const nextCtx = nextCanvas.getContext('2d');
        const holdCanvas = document.getElementById('hold-canvas');
        const holdCtx = holdCanvas.getContext('2d');

        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const linesEl = document.getElementById('lines');
        
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const finalScoreEl = document.getElementById('final-score');
        const restartButton = document.getElementById('restart-button');

        const COLS = 10;
        const ROWS = 20;
        let blockSize;

        const TETROMINOES = {
            'I': { shape: [[1, 1, 1, 1]], color: '#00f0f0' },
            'O': { shape: [[1, 1], [1, 1]], color: '#f0f000' },
            'T': { shape: [[0, 1, 0], [1, 1, 1]], color: '#a000f0' },
            'S': { shape: [[0, 1, 1], [1, 1, 0]], color: '#00f000' },
            'Z': { shape: [[1, 1, 0], [0, 1, 1]], color: '#f00000' },
            'J': { shape: [[1, 0, 0], [1, 1, 1]], color: '#0000f0' },
            'L': { shape: [[0, 0, 1], [1, 1, 1]], color: '#f0a000' }
        };
        const PIECES = Object.keys(TETROMINOES);

        let board = [];
        let currentPiece;
        let nextPiece;
        let holdPiece = null;
        let canHold = true;
        let score = 0;
        let lines = 0;
        let level = 1;
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let gameOver = false;
        let lineClearFlash = [];

        function createBoard() {
            return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        }

        function getRandomPiece() {
            const type = PIECES[Math.floor(Math.random() * PIECES.length)];
            const piece = TETROMINOES[type];
            return {
                type: type,
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(COLS / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }

        function resetGame() {
            board = createBoard();
            score = 0;
            lines = 0;
            level = 1;
            dropInterval = 1000;
            currentPiece = getRandomPiece();
            nextPiece = getRandomPiece();
            holdPiece = null;
            canHold = true;
            gameOver = false;
            gameOverOverlay.style.display = 'none';
            updateUI();
        }

        function rotate(matrix) {
            const N = matrix.length;
            const M = matrix[0].length;
            const result = Array.from({ length: M }, () => Array(N).fill(0));
            for (let r = 0; r < N; r++) {
                for (let c = 0; c < M; c++) {
                    if (matrix[r][c]) {
                        result[c][N - 1 - r] = matrix[r][c];
                    }
                }
            }
            return result;
        }

        function playerRotate() {
            if (gameOver) return;
            const originalShape = currentPiece.shape;
            const rotated = rotate(currentPiece.shape);
            const originalX = currentPiece.x;
            let kick = 0;

            currentPiece.shape = rotated;

            // Wall kick logic
            while (collides(currentPiece)) {
                currentPiece.x += (kick > 0 ? -kick : kick);
                kick = (kick > 0) ? kick + 1 : kick - 1;
                if (Math.abs(kick) > Math.ceil(rotated[0].length / 2)) {
                    currentPiece.shape = originalShape;
                    currentPiece.x = originalX;
                    return;
                }
            }
        }

        function collides(piece) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x] &&
                        (board[y + piece.y] && board[y + piece.y][x + piece.x]) !== 0) {
                        return true;
                    }
                    if (piece.shape[y][x] &&
                        (x + piece.x < 0 || x + piece.x >= COLS || y + piece.y >= ROWS)) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(piece) {
            piece.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        board[y + piece.y][x + piece.x] = piece.color;
                    }
                });
            });
        }

        function playerDrop() {
            if (gameOver) return;
            currentPiece.y++;
            if (collides(currentPiece)) {
                currentPiece.y--;
                solidify();
            }
            dropCounter = 0;
        }
        
        function hardDrop() {
            if (gameOver) return;
            while (!collides(currentPiece)) {
                currentPiece.y++;
            }
            currentPiece.y--;
            solidify();
        }

        function solidify() {
            merge(currentPiece);
            clearLines();
            currentPiece = nextPiece;
            nextPiece = getRandomPiece();
            canHold = true;
            if (collides(currentPiece)) {
                endGame();
            }
        }

        function clearLines() {
            let linesCleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell !== 0)) {
                    linesCleared++;
                    lineClearFlash.push({ y: r, time: 0.5 });
                    board.splice(r, 1);
                }
            }
            if (linesCleared > 0) {
                for (let i = 0; i < linesCleared; i++) {
                    board.unshift(Array(COLS).fill(0));
                }
                lines += linesCleared;
                score += [0, 100, 300, 500, 800][linesCleared] * level;
                if (lines >= level * 10) {
                    level++;
                    dropInterval = Math.max(100, 1000 - (level - 1) * 50);
                }
            }
        }

        function playerMove(dir) {
            if (gameOver) return;
            currentPiece.x += dir;
            if (collides(currentPiece)) {
                currentPiece.x -= dir;
            }
        }
        
        function hold() {
            if (gameOver || !canHold) return;
            if (holdPiece) {
                [currentPiece, holdPiece] = [holdPiece, currentPiece];
                currentPiece.x = Math.floor(COLS / 2) - Math.floor(currentPiece.shape[0].length / 2);
                currentPiece.y = 0;
            } else {
                holdPiece = currentPiece;
                currentPiece = nextPiece;
                nextPiece = getRandomPiece();
            }
            canHold = false;
            if (collides(currentPiece)) {
                endGame();
            }
        }

        function drawBlock(ctx, x, y, color, size, opacity = 1) {
            ctx.fillStyle = color;
            ctx.globalAlpha = opacity;
            ctx.fillRect(x * size, y * size, size, size);

            // Neon glow effect
            ctx.shadowColor = color;
            ctx.shadowBlur = size / 2;
            ctx.fillRect(x * size, y * size, size, size);
            ctx.shadowBlur = 0;

            // Inner highlight
            ctx.globalAlpha = opacity * 0.7;
            ctx.fillStyle = 'white';
            ctx.fillRect(x * size + size * 0.2, y * size + size * 0.2, size * 0.6, size * 0.6);
            ctx.globalAlpha = 1;
        }

        function drawMatrix(ctx, matrix, offset, color, size, opacity = 1) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        drawBlock(ctx, x + offset.x, y + offset.y, color, size, opacity);
                    }
                });
            });
        }
        
        function drawGhostPiece() {
            const ghost = JSON.parse(JSON.stringify(currentPiece));
            while (!collides(ghost)) {
                ghost.y++;
            }
            ghost.y--;
            drawMatrix(ctx, ghost.shape, { x: ghost.x, y: ghost.y }, ghost.color, blockSize, 0.2);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#12121a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw board
            board.forEach((row, y) => {
                row.forEach((color, x) => {
                    if (color !== 0) {
                        drawBlock(ctx, x, y, color, blockSize);
                    }
                });
            });
            
            // Draw line clear flash
            lineClearFlash.forEach(flash => {
                ctx.fillStyle = 'white';
                ctx.globalAlpha = flash.time * 2;
                ctx.fillRect(0, flash.y * blockSize, canvas.width, blockSize);
            });
            ctx.globalAlpha = 1;


            if (!gameOver) {
                drawGhostPiece();
                drawMatrix(ctx, currentPiece.shape, { x: currentPiece.x, y: currentPiece.y }, currentPiece.color, blockSize);
            }
            
            drawSidePanel(nextCtx, nextPiece);
            drawSidePanel(holdCtx, holdPiece);
        }
        
        function drawSidePanel(panelCtx, piece) {
            panelCtx.clearRect(0, 0, panelCtx.canvas.width, panelCtx.canvas.height);
            if (piece) {
                const size = panelCtx.canvas.width / 4;
                const offsetX = (panelCtx.canvas.width - piece.shape[0].length * size) / 2 / size;
                const offsetY = (panelCtx.canvas.height - piece.shape.length * size) / 2 / size;
                drawMatrix(panelCtx, piece.shape, {x: offsetX, y: offsetY}, piece.color, size);
            }
        }

        function updateUI() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            linesEl.textContent = lines;
        }

        function update(time = 0) {
            if (gameOver) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            
            // Update line clear animation
            for (let i = lineClearFlash.length - 1; i >= 0; i--) {
                lineClearFlash[i].time -= deltaTime / 1000;
                if (lineClearFlash[i].time <= 0) {
                    lineClearFlash.splice(i, 1);
                }
            }

            draw();
            updateUI();
            requestAnimationFrame(update);
        }
        
        function endGame() {
            gameOver = true;
            finalScoreEl.textContent = score;
            gameOverOverlay.style.display = 'flex';
        }

        function handleResize() {
            const vh = window.innerHeight;
            const containerPadding = 40;
            const availableHeight = vh - containerPadding;
            
            blockSize = Math.floor(availableHeight / ROWS);
            
            canvas.width = COLS * blockSize;
            canvas.height = ROWS * blockSize;
            
            ctx.scale(1, 1); // Reset scale before redrawing

            const uiPanels = document.querySelectorAll('.ui-panel');
            uiPanels.forEach(panel => {
                panel.style.height = `${canvas.height}px`;
            });
            
            nextCanvas.width = 4 * blockSize;
            nextCanvas.height = 4 * blockSize;
            holdCanvas.width = 4 * blockSize;
            holdCanvas.height = 4 * blockSize;

            document.querySelector('.ui-panel').style.width = `${4 * blockSize}px`;

            draw();
        }

        document.addEventListener('keydown', event => {
            if (gameOver) return;
            switch (event.code) {
                case 'ArrowLeft':
                    playerMove(-1);
                    break;
                case 'ArrowRight':
                    playerMove(1);
                    break;
                case 'ArrowDown':
                    playerDrop();
                    break;
                case 'ArrowUp':
                    playerRotate();
                    break;
                case 'Space':
                    event.preventDefault();
                    hardDrop();
                    break;
                case 'ShiftLeft':
                case 'ShiftRight':
                case 'KeyC':
                    hold();
                    break;
            }
        });
        
        restartButton.addEventListener('click', () => {
            resetGame();
            update();
        });

        window.addEventListener('resize', handleResize);
        
        // Initial setup
        resetGame();
        handleResize();
        update();
    })();
    </script>
</body>
</html>
