<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Marble Madness</title><style>
  body { background: #050510; color: #fff; margin: 0; overflow: hidden; font-family: monospace; }
  canvas { background: #111; display: block; }
  #ui { position: fixed; top: 10px; left: 10px; z-index: 10; }
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 20; }
  button { margin-top: 20px; padding: 10px 20px; background: transparent; border: 1px solid #0ff; color: #0ff; cursor: pointer; }
</style></head>
<body>
  <div id="ui">TIME: <span id="t">0</span></div>
  <div id="start" class="screen"><h1>MARBLE MADNESS</h1><button onclick="st()">START</button></div>
  <div id="over" class="screen" style="display:none;"><h1 id="om">GAME OVER</h1><button onclick="st()">RETRY</button></div>
  <canvas id="c"></canvas>
  <script>
    const cvs=document.getElementById('c'), ctx=cvs.getContext('2d');
    let W,H, p, run=false, tm=0, keys={}, hz=[];
    function rs() { W=cvs.width=window.innerWidth; H=cvs.height=window.innerHeight; }
    window.addEventListener('resize', rs); rs();
    function st() {
      document.getElementById('start').style.display='none'; document.getElementById('over').style.display='none';
      p={x: 50, y: 50, vx:0, vy:0, r:15}; hz=[];
      for(let i=0;i<10;i++) hz.push({x:100+Math.random()*(W-200), y:100+Math.random()*(H-200), r:20});
      run=true; tm=Date.now(); loop();
    }
    window.addEventListener('keydown', e=>{keys[e.code]=true;});
    window.addEventListener('keyup', e=>{keys[e.code]=false;});
    function go(win) { run=false; document.getElementById('over').style.display='flex'; document.getElementById('om').innerText=win?'YOU WIN!':'GAME OVER'; }
    function loop() {
      if(!run) return; requestAnimationFrame(loop);
      if(keys['ArrowLeft']) p.vx-=0.5; if(keys['ArrowRight']) p.vx+=0.5;
      if(keys['ArrowUp']) p.vy-=0.5; if(keys['ArrowDown']) p.vy+=0.5;
      p.vx*=0.9; p.vy*=0.9; p.x+=p.vx; p.y+=p.vy;
      if(p.x<p.r || p.x>W-p.r || p.y<p.r || p.y>H-p.r) return go(false);
      for(let h of hz) { let dx=p.x-h.x, dy=p.y-h.y; if(Math.sqrt(dx*dx+dy*dy)<p.r+h.r) return go(false); }
      if(p.x>W-80 && p.y>H-80) return go(true);
      document.getElementById('t').innerText=((Date.now()-tm)/1000).toFixed(1);
      ctx.clearRect(0,0,W,H); 
      ctx.fillStyle='#0f0'; ctx.fillRect(W-80,H-80,80,80);
      ctx.fillStyle='#f00'; hz.forEach(h=>{ctx.beginPath();ctx.arc(h.x,h.y,h.r,0,6.28);ctx.fill();});
      ctx.fillStyle='#0ff'; ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();
    }
  </script>
</body>
</html>
