<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Generated by Gemini 3.1 Pro Engine -->
  <meta name="author" content="Gemini 3.1 Pro">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marble Madness</title>
    <style>
  /* Gemini 3.1 Pro Enhanced Aesthetics */
  body { background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%) !important; color: #fff; }
  canvas { box-shadow: 0 0 25px rgba(0, 255, 200, 0.4) !important; border-radius: 12px !important; transition: all 0.3s ease; }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff00ff;
            font-size: 24px;
        }
        #message {
            position: absolute;
            color: #ff00ff;
            font-size: 48px;
            text-align: center;
            display: none;
        }
        #message button {
            font-size: 24px;
            background-color: #ff00ff;
            border: none;
            color: #050510;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">Time: <span id="timer">0.00</span></div>
    <div id="message">
        <span id="messageText"></span><br>
        <button id="restart">Restart</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const timerEl = document.getElementById('timer');
            const messageEl = document.getElementById('message');
            const messageTextEl = document.getElementById('messageText');
            const restartBtn = document.getElementById('restart');

            let width, height;
            let gameRunning = true;
            let startTime;

            const marble = {
                x: 100,
                y: 100,
                radius: 15,
                vx: 0,
                vy: 0,
                ax: 0,
                ay: 0
            };

            const goal = {
                x: 0,
                y: 0,
                radius: 25
            };

            const platforms = [
                { x: 50, y: 150, width: 200, height: 20 },
                { x: 300, y: 250, width: 200, height: 20 },
                { x: 100, y: 400, width: 300, height: 20 },
                { x: 500, y: 500, width: 200, height: 20 }
            ];

            const keys = {};
            const force = 0.5;
            const gravity = 0.2;
            const friction = 0.98;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                goal.x = width - 100;
                goal.y = height - 100;
            }

            function init() {
                marble.x = 100;
                marble.y = 100;
                marble.vx = 0;
                marble.vy = 0;
                startTime = Date.now();
                gameRunning = true;
                messageEl.style.display = 'none';
                draw();
                loop();
            }

            function update() {
                if (!gameRunning) return;

                // Apply forces from keys
                marble.ax = 0;
                marble.ay = gravity;
                if (keys['ArrowUp'] || keys['KeyW']) marble.ay -= force;
                if (keys['ArrowDown'] || keys['KeyS']) marble.ay += force;
                if (keys['ArrowLeft'] || keys['KeyA']) marble.ax -= force;
                if (keys['ArrowRight'] || keys['KeyD']) marble.ax += force;

                // Update velocity and position
                marble.vx += marble.ax;
                marble.vy += marble.ay;
                marble.vx *= friction;
                marble.vy *= friction;
                marble.x += marble.vx;
                marble.y += marble.vy;

                // Platform collision
                let onPlatform = false;
                platforms.forEach(p => {
                    if (marble.x > p.x && marble.x < p.x + p.width &&
                        marble.y + marble.radius > p.y && marble.y + marble.radius < p.y + p.height + 10 && marble.vy > 0) {
                        marble.y = p.y - marble.radius;
                        marble.vy = 0;
                        onPlatform = true;
                    }
                });

                // Edge detection
                if (marble.x - marble.radius < 0) { marble.x = marble.radius; marble.vx *= -0.8; }
                if (marble.x + marble.radius > width) { marble.x = width - marble.radius; marble.vx *= -0.8; }
                if (marble.y - marble.radius < 0) { marble.y = marble.radius; marble.vy *= -0.8; }
                if (marble.y + marble.radius > height) {
                    endGame("You fell off!");
                }

                // Goal detection
                const dx = marble.x - goal.x;
                const dy = marble.y - goal.y;
                if (Math.sqrt(dx * dx + dy * dy) < marble.radius + goal.radius) {
                    endGame(`You reached the goal in ${((Date.now() - startTime) / 1000).toFixed(2)}s!`);
                }

                timerEl.textContent = ((Date.now() - startTime) / 1000).toFixed(2);
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);

                // Draw platforms
                ctx.fillStyle = '#ff00ff';
                platforms.forEach(p => {
                    ctx.fillRect(p.x, p.y, p.width, p.height);
                });

                // Draw goal
                ctx.fillStyle = '#00ff00';
                ctx.beginPath();
                ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI * 2);
                ctx.fill();

                // Draw marble
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(marble.x, marble.y, marble.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Glow effect for marble
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.shadowBlur = 0;


                if (gameRunning) {
                    requestAnimationFrame(draw);
                }
            }

            function loop() {
                update();
                if (gameRunning) {
                    setTimeout(loop, 1000 / 60);
                }
            }

            function endGame(message) {
                gameRunning = false;
                messageTextEl.textContent = message;
                messageEl.style.display = 'block';
            }

            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('resize', resize);
            restartBtn.addEventListener('click', init);

            resize();
            init();
            draw();
        })();
    </script>
</body>
</html>
