<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARBLE MADNESS — NEON EDITION</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000511;overflow:hidden;font-family:'Courier New',Courier,monospace}
#c{display:block;width:100vw;height:100vh}
#ui{position:fixed;inset:0;pointer-events:none;user-select:none;z-index:10}

/* ── TITLE ── */
#title-screen{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:all;
  background:radial-gradient(ellipse at 50% 40%,#001a33 0%,#000511 60%,#000000 100%);
  transition:opacity .5s;
}
#title-screen h1{
  font-size:clamp(38px,9vw,96px);letter-spacing:.18em;color:#00ffcc;
  text-shadow:0 0 18px #00ffcc,0 0 55px #00ff88,0 0 110px #00aa44;
  animation:titlePulse 2.8s ease-in-out infinite;
}
@keyframes titlePulse{
  0%,100%{text-shadow:0 0 18px #00ffcc,0 0 55px #00ff88}
  50%{text-shadow:0 0 28px #00ffcc,0 0 80px #00ff88,0 0 140px #00ff44}
}
.title-sub{font-size:clamp(10px,1.8vw,17px);letter-spacing:.55em;color:#33aa88;opacity:.65;margin-top:6px;margin-bottom:48px}
.level-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:38px}
.lvl-btn{
  pointer-events:all;cursor:pointer;padding:18px 28px;
  background:rgba(0,255,200,.04);border:1px solid currentColor;
  font-family:inherit;font-size:13px;letter-spacing:.22em;color:#00ffcc;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  transition:all .18s;
}
.lvl-btn:hover{background:rgba(0,255,200,.14);box-shadow:0 0 22px currentColor;text-shadow:0 0 8px currentColor}
.lvl-btn .n{font-size:clamp(20px,4vw,32px);display:block;margin-bottom:4px;font-weight:700}
.lvl-btn .s{font-size:10px;opacity:.55;letter-spacing:.28em}
.hint-text{color:#1e3344;font-size:clamp(10px,1.4vw,13px);text-align:center;line-height:2.1;letter-spacing:.1em}

/* ── HUD ── */
#hud{
  position:absolute;top:0;left:0;right:0;padding:14px 22px;
  display:none;justify-content:space-between;align-items:flex-start;
  background:linear-gradient(to bottom,rgba(0,0,0,.58),transparent);
}
.hb{display:flex;flex-direction:column;gap:3px}
.hl{font-size:10px;letter-spacing:.38em;color:#3a5566;text-transform:uppercase}
.hv{font-size:clamp(19px,3.5vw,30px);font-weight:700;letter-spacing:.05em}
.hc{text-align:center;align-items:center}
.hlvl{font-size:clamp(12px,1.9vw,17px);letter-spacing:.42em}
#hud-pen{font-size:11px;color:#ff5555;letter-spacing:.18em;min-height:15px}

/* ── LEVEL COMPLETE ── */
#level-complete{
  position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,2,18,.88);pointer-events:all;
}
#lc-title{font-size:clamp(26px,5.5vw,56px);letter-spacing:.25em;margin-bottom:4px}
#lc-rating{font-size:clamp(68px,13vw,115px);margin:10px 0;animation:popIn .45s cubic-bezier(.17,.67,.3,1.55)}
@keyframes popIn{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.lc-row{display:flex;gap:44px;margin:10px 0;flex-wrap:wrap;justify-content:center}
.lc-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.lc-val{font-size:clamp(17px,3.2vw,30px);font-weight:700}
.btn-row{display:flex;gap:14px;margin-top:26px;flex-wrap:wrap;justify-content:center}
.abtn{
  cursor:pointer;padding:13px 24px;background:transparent;border:1px solid currentColor;
  font-family:inherit;font-size:13px;letter-spacing:.18em;transition:all .18s;pointer-events:all;
}
.abtn:hover{background:currentColor;color:#000}

/* ── END SCREEN ── */
#end-screen{
  position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.93);pointer-events:all;
}
#end-screen h2{font-size:clamp(24px,4.8vw,50px);letter-spacing:.22em;margin-bottom:24px}
.end-grid{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap;justify-content:center}
.end-card{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:22px 28px;border:1px solid;background:rgba(255,255,255,.02);min-width:130px;
}
.end-card .ecn{font-size:10px;letter-spacing:.32em;opacity:.5}
.end-card .ecr{font-size:40px}
.end-card .ect{font-size:22px;font-weight:700}

/* ── MUTE ── */
#mute-btn{
  position:fixed;top:13px;right:13px;z-index:100;
  width:42px;height:42px;background:rgba(0,0,0,.52);border:1px solid #1e3344;
  border-radius:4px;color:#3e5566;font-size:19px;cursor:pointer;pointer-events:all;
  display:flex;align-items:center;justify-content:center;transition:all .18s;
}
#mute-btn:hover{border-color:#00bbdd;color:#00bbdd}

/* ── FLASH / FLOAT ── */
.fov{position:absolute;inset:0;pointer-events:none;display:none;opacity:0}
#fall-flash{background:rgba(255,35,35,.28);animation:fla .75s ease-out forwards}
#resp-flash{background:rgba(0,200,255,.18);animation:fla .55s ease-out forwards}
#gem-flash{background:rgba(255,245,80,.1);animation:fla .38s ease-out forwards}
@keyframes fla{from{opacity:1}to{opacity:0}}
#floater{
  position:absolute;left:50%;top:44%;transform:translateX(-50%);
  font-size:clamp(18px,3.8vw,34px);font-weight:700;letter-spacing:.2em;
  pointer-events:none;display:none;white-space:nowrap;
  animation:floatUp 1.5s ease-out forwards;
}
@keyframes floatUp{
  0%{opacity:0;transform:translateX(-50%) translateY(0) scale(.75)}
  15%{opacity:1;transform:translateX(-50%) translateY(-12px) scale(1.05)}
  75%{opacity:1;transform:translateX(-50%) translateY(-35px)}
  100%{opacity:0;transform:translateX(-50%) translateY(-70px)}
}
#ctrl-hint{
  position:absolute;bottom:13px;right:14px;color:#172535;
  font-size:11px;letter-spacing:.12em;text-align:right;line-height:1.95;display:none;
}
/* countdown ring on checkpoint platforms */
.pulse-ring{animation:pRing 1s ease-in-out infinite}
@keyframes pRing{0%,100%{opacity:.4}50%{opacity:1}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <!-- TITLE -->
  <div id="title-screen">
    <h1>MARBLE MADNESS</h1>
    <div class="title-sub">N E O N &nbsp; E D I T I O N</div>
    <div class="level-row">
      <button class="lvl-btn" style="color:#00ffcc" onclick="startGame(0)">
        <span class="n">01</span><span class="s">SECTOR ONE</span>
      </button>
      <button class="lvl-btn" style="color:#00aaff" onclick="startGame(1)">
        <span class="n">02</span><span class="s">SECTOR TWO</span>
      </button>
      <button class="lvl-btn" style="color:#bb44ff" onclick="startGame(2)">
        <span class="n">03</span><span class="s">SECTOR THREE</span>
      </button>
    </div>
    <div class="hint-text">
      WASD / ARROW KEYS &mdash; ROLL &nbsp;&nbsp; SPACE &mdash; JUMP<br>
      COLLECT ✦ GEMS FOR TIME BONUSES &nbsp;&nbsp; REACH THE ◎ PORTAL
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hb">
      <div class="hl">TIME</div>
      <div class="hv" id="hud-time">00:00.0</div>
      <div id="hud-pen"></div>
    </div>
    <div class="hb hc">
      <div class="hlvl hv" id="hud-lvl">SECTOR ONE</div>
      <div class="hl">GEMS ✦</div>
      <div class="hv" id="hud-gems">0 / 6</div>
    </div>
    <div class="hb" style="align-items:flex-end">
      <div class="hl">FALLS</div>
      <div class="hv" id="hud-falls" style="color:#ff5555">0</div>
    </div>
  </div>

  <!-- LEVEL COMPLETE -->
  <div id="level-complete">
    <div id="lc-title">SECTOR CLEAR</div>
    <div id="lc-rating">🥇</div>
    <div class="lc-row">
      <div class="lc-item"><div class="hl">FINAL TIME</div><div class="lc-val" id="lc-time">00:00.0</div></div>
      <div class="lc-item"><div class="hl">GEMS</div><div class="lc-val" id="lc-gems">0/6</div></div>
      <div class="lc-item"><div class="hl">BONUS</div><div class="lc-val" id="lc-bonus" style="color:#00ff88">-0.0s</div></div>
    </div>
    <div class="btn-row" id="lc-btns"></div>
  </div>

  <!-- END SCREEN -->
  <div id="end-screen">
    <h2>⊛ ALL SECTORS CLEAR ⊛</h2>
    <div class="end-grid" id="end-grid"></div>
    <div class="btn-row">
      <button class="abtn" style="color:#00ffcc" onclick="showTitle()">MAIN MENU</button>
    </div>
  </div>

  <button id="mute-btn" onclick="toggleMute()">🔊</button>
  <div class="fov" id="fall-flash"></div>
  <div class="fov" id="resp-flash"></div>
  <div class="fov" id="gem-flash"></div>
  <div id="floater"></div>
  <div id="ctrl-hint">WASD / ARROWS: MOVE &nbsp;&nbsp; SPACE: JUMP</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const MR       = 0.42;   // marble radius
const GRAV     = -23;
const MFORCE   = 34;
const JUMP_IMP = 11;
const MAX_HS   = 13;     // max horizontal speed
const FR_GND   = 0.80;   // friction exponent ground
const FR_AIR   = 0.993;
const BOUNCE   = 0.22;
const STEPS    = 3;
const FALL_Y   = -14;
const CAM_LRP  = 0.07;
const GEM_DST  = 1.15;
const GOAL_DST = 2.0;
const CP_DST   = 2.8;
const PENALTY  = 5;
const GEM_BON  = 3;
const TRAIL_N  = 28;

// ═══════════════════════════════════════════════════════════════
// RENDERER / SCENE / CAMERA
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000511);
scene.fog = new THREE.FogExp2(0x000511, 0.0065);

const camera = new THREE.PerspectiveCamera(64, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 10, -15);

// Lights
const ambLight = new THREE.AmbientLight(0x112244, 1.0);
scene.add(ambLight);

const sunLight = new THREE.DirectionalLight(0x4466aa, 0.7);
sunLight.position.set(12, 28, -8);
sunLight.castShadow = true;
sunLight.shadow.mapSize.setScalar(2048);
const sc = sunLight.shadow.camera;
sc.near = 0.5; sc.far = 280; sc.left = sc.bottom = -80; sc.right = sc.top = 80;
scene.add(sunLight);

// ── Starfield ──
{
  const N = 4500, pos = new Float32Array(N * 3), col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
    const r = 175 + Math.random() * 85;
    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
    pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
    pos[i*3+2] = r * Math.cos(ph);
    const t = Math.random();
    col[i*3]   = 0.68 + t * 0.32;
    col[i*3+1] = 0.68 + t * 0.22;
    col[i*3+2] = 0.88 + t * 0.12;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({
    size: 0.42, vertexColors: true, transparent: true, opacity: 0.88
  })));
}

// ── Glow texture (canvas radial gradient) ──
const GLOW_TEX = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  g.addColorStop(0,    'rgba(255,255,255,1)');
  g.addColorStop(0.28, 'rgba(255,255,255,0.55)');
  g.addColorStop(1,    'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
})();

// ═══════════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════════
let actx = null, masterG = null, musicG = null, sfxG = null;
let rollOsc = null, rollGN = null;
let isMuted = false;
let musicOn = false, musicLvl = -1, musicT = 0, musicIdx = 0;
const mnodes = [];

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  masterG = actx.createGain(); masterG.gain.value = 0.65; masterG.connect(actx.destination);
  musicG  = actx.createGain(); musicG.gain.value  = 0.28; musicG.connect(masterG);
  sfxG    = actx.createGain(); sfxG.gain.value    = 0.88; sfxG.connect(masterG);
  rollOsc = actx.createOscillator(); rollOsc.type = 'sine'; rollOsc.frequency.value = 50;
  rollGN  = actx.createGain(); rollGN.gain.value = 0;
  const rf = actx.createBiquadFilter(); rf.type = 'bandpass'; rf.frequency.value = 75; rf.Q.value = 3.5;
  rollOsc.connect(rf); rf.connect(rollGN); rollGN.connect(sfxG);
  rollOsc.start();
}

// Music data per level — bass/melody/pad note arrays
const MD = [
  { bpm: 88,  bass:[65.4,65.4,73.4,82.4,65.4,65.4,87.3,82.4], mel:[523,659,784,659,523,392,440,523],   pad:[130.8,164.8,196,261.6] },
  { bpm: 108, bass:[73.4,73.4,65.4,87.3,73.4,73.4,98.0,87.3], mel:[587,740,880,740,587,494,554,587],   pad:[146.8,185,220,293.7]   },
  { bpm: 126, bass:[55.0,55.0,61.7,73.4,55.0,55.0,82.4,73.4], mel:[440,554,659,554,440,370,415,440],   pad:[110,138.6,164.8,220]   },
];

function sNote(freq, t0, dur, type, vol, lp = 900) {
  if (!actx || isMuted) return;
  const o = actx.createOscillator(), g = actx.createGain(), f = actx.createBiquadFilter();
  o.type = type; o.frequency.value = freq;
  f.type = 'lowpass'; f.frequency.value = lp; f.Q.value = 0.6;
  o.connect(f); f.connect(g); g.connect(musicG);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.012);
  g.gain.setValueAtTime(vol, t0 + dur - 0.07);
  g.gain.linearRampToValueAtTime(0, t0 + dur);
  o.start(t0); o.stop(t0 + dur + 0.01);
  mnodes.push(o);
}

function schedBeat() {
  if (!actx || !musicOn || musicLvl < 0 || isMuted) return;
  const d = MD[musicLvl]; if (!d) return;
  const bd = 60 / d.bpm;
  while (musicT < actx.currentTime + 0.45) {
    const i = musicIdx % d.bass.length;
    const t = musicT;
    sNote(d.bass[i], t, bd * 0.82, 'sawtooth', 0.20, 240);
    if (i % 2 === 0) {
      const mi = (i >> 1) % d.mel.length;
      sNote(d.mel[mi], t + bd * 0.52, bd * 0.36, 'sine', 0.10, 2200);
    }
    if (i % 4 === 0) d.pad.forEach(f => sNote(f, t, bd * 3.88, 'sine', 0.052, 520));
    // hi-hat-ish click
    if (i % 2 === 0 && !isMuted) {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'square'; o.frequency.setValueAtTime(160, t); o.frequency.exponentialRampToValueAtTime(55, t + 0.07);
      g.gain.setValueAtTime(0.10, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
      o.connect(g); g.connect(musicG); o.start(t); o.stop(t + 0.08); mnodes.push(o);
    }
    musicT += bd; musicIdx++;
    if (mnodes.length > 220) mnodes.splice(0, 60).forEach(n => { try { n.stop(); } catch (_) {} });
  }
  setTimeout(schedBeat, 115);
}

function startMusic(lvl) {
  stopMusic();
  if (!actx || isMuted) return;
  musicLvl = lvl; musicOn = true; musicIdx = 0;
  musicT = actx.currentTime + 0.12;
  schedBeat();
}
function stopMusic() {
  musicOn = false; musicLvl = -1;
  mnodes.splice(0).forEach(n => { try { n.stop(); } catch (_) {} });
}
function updateRoll(spd) {
  if (!rollOsc || isMuted) return;
  const t = actx.currentTime;
  const tg = onGround ? Math.min(spd / MAX_HS, 1) * 0.26 : Math.min(spd / MAX_HS, 1) * 0.06;
  rollGN.gain.setTargetAtTime(tg, t, 0.05);
  rollOsc.frequency.setTargetAtTime(44 + spd * 9, t, 0.09);
}

function sfx(type) {
  if (!actx || isMuted) return;
  const t = actx.currentTime;
  const n = (f, t0, dur, tp, vol) => {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = tp; o.frequency.value = f;
    o.connect(g); g.connect(sfxG);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.start(t0); o.stop(t0 + dur + 0.01);
    return o;
  };
  switch (type) {
    case 'jump': {
      const o = n(180, t, 0.22, 'sine', 0.38);
      o.frequency.setValueAtTime(180, t);
      o.frequency.exponentialRampToValueAtTime(560, t + 0.07);
      o.frequency.exponentialRampToValueAtTime(195, t + 0.22);
    } break;
    case 'land': {
      const buf = actx.createBuffer(1, Math.floor(actx.sampleRate * 0.09), actx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.2) * 0.75;
      const src = actx.createBufferSource(), g = actx.createGain();
      const f = actx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 300; f.Q.value = 2.5;
      src.buffer = buf; src.connect(f); f.connect(g); g.connect(sfxG);
      g.gain.setValueAtTime(0.55, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
      src.start(t);
    } break;
    case 'gem':
      [523.25, 659.26, 880, 1108.7].forEach((f, i) => {
        const o = n(f, t + i * 0.057, 0.28, 'sine', 0.22);
        o.frequency.setValueAtTime(f, t + i * 0.057);
      }); break;
    case 'fall': {
      const o = n(380, t, 0.92, 'sawtooth', 0.28);
      o.frequency.setValueAtTime(380, t);
      o.frequency.exponentialRampToValueAtTime(38, t + 0.92);
    } break;
    case 'respawn':
      [261.63, 329.63, 392, 523.25].forEach((f, i) => n(f, t + i * 0.072, 0.22, 'sine', 0.18)); break;
    case 'checkpoint': {
      const o = n(660, t, 0.30, 'sine', 0.30);
      o.frequency.setValueAtTime(660, t);
      o.frequency.exponentialRampToValueAtTime(990, t + 0.16);
    } break;
    case 'complete':
      [523.25, 659.26, 784, 1046.5, 784, 1046.5, 1318.5].forEach((f, i) => n(f, t + i * 0.10, 0.44, 'sine', 0.28)); break;
    case 'moveplat': {
      if (!actx || isMuted) break;
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'sine'; o.frequency.value = 55;
      o.connect(g); g.connect(sfxG);
      g.gain.setValueAtTime(0.05, t); g.gain.setValueAtTime(0.05, t + 0.3); g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      o.start(t); o.stop(t + 0.36);
    } break;
  }
}

// ═══════════════════════════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════
const PMAX = 320;
const pPool = [];

function initParticles() {
  for (let i = 0; i < PMAX; i++) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.058, 4, 4),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, depthWrite: false })
    );
    m.visible = false;
    scene.add(m);
    pPool.push({ m, vel: new THREE.Vector3(), life: 0, maxL: 1 });
  }
}
function spawnParts(pos, color, cnt, spd, life) {
  let n = 0;
  for (const p of pPool) {
    if (n >= cnt) break;
    if (p.life <= 0) {
      p.m.position.copy(pos);
      p.m.material.color.setHex(color);
      p.m.visible = true;
      const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
      const s = spd * (0.35 + Math.random() * 0.85);
      p.vel.set(s * Math.sin(ph) * Math.cos(th), s * (Math.abs(Math.cos(ph)) + 0.4), s * Math.sin(ph) * Math.sin(th));
      p.life = life * (0.55 + Math.random() * 0.55); p.maxL = p.life; n++;
    }
  }
}
function tickParts(dt) {
  for (const p of pPool) {
    if (p.life <= 0) continue;
    p.life -= dt;
    if (p.life <= 0) { p.m.visible = false; continue; }
    p.vel.y -= 13 * dt;
    p.m.position.addScaledVector(p.vel, dt);
    p.m.material.opacity = (p.life / p.maxL) * 0.88;
  }
}

// BUILD: MARBLE
// ═══════════════════════════════════════════════════════════════
function buildMarble(color) {
  [mMesh, mGlowM, ...trailM].forEach(o => { if (o) scene.remove(o); });
  trailM.length = 0; trailP.length = 0;

  const mat = new THREE.MeshPhongMaterial({
    color: 0x0d0d22, emissive: new THREE.Color(color), emissiveIntensity: 0.82,
    shininess: 230, specular: new THREE.Color(color),
  });
  mMesh = new THREE.Mesh(new THREE.SphereGeometry(MR, 32, 32), mat);
  mMesh.castShadow = true;
  scene.add(mMesh);

  // outer glow shell
  mGlowM = new THREE.Mesh(
    new THREE.SphereGeometry(MR * 2.0, 16, 16),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.12, side: THREE.BackSide, depthWrite: false })
  );
  mMesh.add(mGlowM);

  // inner secondary glow
  const mGlow2 = new THREE.Mesh(
    new THREE.SphereGeometry(MR * 1.35, 16, 16),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.18, side: THREE.BackSide, depthWrite: false })
  );
  mMesh.add(mGlow2);

  mPtL = new THREE.PointLight(color, 2.8, 10);
  mMesh.add(mPtL);

  // glow sprite on marble
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: GLOW_TEX, color, transparent: true, opacity: 0.38,
    blending: THREE.AdditiveBlending, depthWrite: false,
  }));
  sp.scale.set(3.5, 3.5, 1);
  mMesh.add(sp);

  // trail spheres
  for (let i = 0; i < TRAIL_N; i++) {
    const r = MR * (1 - i / TRAIL_N) * 0.72;
    const tm = new THREE.Mesh(
      new THREE.SphereGeometry(Math.max(r, 0.022), 6, 6),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0, depthWrite: false })
    );
    tm.visible = false;
    scene.add(tm);
    trailM.push(tm);
  }
}

function updateTrail() {
  const spd = mVel.length();
  const last = trailP[trailP.length - 1];
  if (!last || mPos.distanceTo(last) > 0.13) {
    trailP.push(mPos.clone());
    if (trailP.length > TRAIL_N) trailP.shift();
  }
  for (let i = 0; i < TRAIL_N; i++) {
    const tm = trailM[i];
    const hi = trailP.length - 1 - i;
    if (hi >= 0) {
      tm.position.copy(trailP[hi]);
      tm.visible = true;
      const a = (TRAIL_N - i) / TRAIL_N;
      tm.material.opacity = a * 0.42 * Math.min(spd / MAX_HS, 1);
    } else {
      tm.visible = false;
    }
  }
}

// BUILD: PLATFORM
// ═══════════════════════════════════════════════════════════════
function buildPlatform(pd, pCol, aCol) {
  const [w, h, d] = pd.size;
  const geo = new THREE.BoxGeometry(w, h, d);

  let eI = 0.06;
  if (pd.type === 'disappearing') eI = 0.16;
  else if (pd.type === 'rotating' || pd.type === 'moving') eI = 0.10;

  const mat = new THREE.MeshPhongMaterial({
    color: new THREE.Color(pCol).multiplyScalar(0.06),
    emissive: new THREE.Color(pCol), emissiveIntensity: eI,
    transparent: true, opacity: 0.74,
    shininess: 130, specular: new THREE.Color(aCol),
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  mesh.castShadow = true;
  mesh.position.set(...pd.pos);
  if (pd.rot) mesh.rotation.set(...pd.rot);

  // Neon edge lines
  const edgeMat = new THREE.LineBasicMaterial({ color: pCol, transparent: true, opacity: 0.92 });
  mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat));

  // Rotating — add rim torus
  if (pd.type === 'rotating') {
    const rimR = Math.max(w, d) * 0.5 * 0.88;
    const rim = new THREE.Mesh(
      new THREE.TorusGeometry(rimR, 0.05, 6, 30),
      new THREE.MeshBasicMaterial({ color: pCol, transparent: true, opacity: 0.7 })
    );
    rim.rotation.x = Math.PI / 2;
    mesh.add(rim);
    mesh.add(new THREE.PointLight(pCol, 0.7, 6));
  }
  // Moving — directional arrow + light
  if (pd.type === 'moving') {
    const arrow = new THREE.Mesh(
      new THREE.ConeGeometry(0.22, 0.52, 6),
      new THREE.MeshBasicMaterial({ color: pCol, transparent: true, opacity: 0.55 })
    );
    arrow.position.y = 0.38;
    if (pd.axis === 'x') arrow.rotation.z = -Math.PI / 2;
    mesh.add(arrow);
    mesh.add(new THREE.PointLight(pCol, 0.8, 5.5));
  }
  // Disappearing — extra edge highlight
  if (pd.type === 'disappearing') {
    mesh.add(new THREE.PointLight(pCol, 0.5, 4));
  }

  scene.add(mesh);
  lvlObjs.push(mesh);

  return {
    mesh, type: pd.type, data: pd,
    moveT:  pd.tOff || 0,
    active: true, touched: false,
    fadeT: 0, fadeDur: 1.7,
    respT: 0, respDur: 4.2,
    alpha: 1,
    deltaMove: new THREE.Vector3(),
    _prevPos: new THREE.Vector3().copy(mesh.position),
  };
}

// ═══════════════════════════════════════════════════════════════
// COLLISION: SPHERE vs ORIENTED BOX
// ═══════════════════════════════════════════════════════════════
const _lp  = new THREE.Vector3();
const _cl  = new THREE.Vector3();
const _iq  = new THREE.Quaternion();
const _wq  = new THREE.Quaternion();
const _wp  = new THREE.Vector3();

function sphereOBB(sp, rad, mesh, hx, hy, hz) {
  mesh.updateMatrixWorld(true);
  mesh.getWorldPosition(_wp);
  mesh.getWorldQuaternion(_wq);

  _iq.copy(_wq).invert();
  _lp.copy(sp).sub(_wp).applyQuaternion(_iq);

  _cl.set(
    Math.max(-hx, Math.min(hx, _lp.x)),
    Math.max(-hy, Math.min(hy, _lp.y)),
    Math.max(-hz, Math.min(hz, _lp.z))
  );

  const dx = _lp.x - _cl.x, dy = _lp.y - _cl.y, dz = _lp.z - _cl.z;
  const d2 = dx * dx + dy * dy + dz * dz;
  if (d2 >= rad * rad) return null;

  const dist = Math.sqrt(d2);
  const nx = dist > 0.0001 ? dx / dist : 0;
  const ny = dist > 0.0001 ? dy / dist : 1;
  const nz = dist > 0.0001 ? dz / dist : 0;
  const wn = new THREE.Vector3(nx, ny, nz).applyQuaternion(_wq).normalize();
  return { normal: wn, pen: rad - dist };
}

// ═══════════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════════
const K = {};
document.addEventListener('keydown', e => { K[e.code] = true;  if (e.code === 'Space') e.preventDefault(); });
document.addEventListener('keyup',   e => { K[e.code] = false; });

function getForce() {
  const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd); fwd.y = 0; fwd.normalize();
  const rgt = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();
  const f = new THREE.Vector3();
  if (K['KeyW'] || K['ArrowUp'])    f.addScaledVector(fwd,  1);
  if (K['KeyS'] || K['ArrowDown'])  f.addScaledVector(fwd, -1);
  if (K['KeyD'] || K['ArrowRight']) f.addScaledVector(rgt,  1);
  if (K['KeyA'] || K['ArrowLeft'])  f.addScaledVector(rgt, -1);
  if (f.lengthSq() > 0) f.normalize().multiplyScalar(MFORCE);
  return f;
}

// ═══════════════════════════════════════════════════════════════
// PHYSICS UPDATE
// ═══════════════════════════════════════════════════════════════
function physicsStep(dt) {
  if (!mMesh || gState !== 'PLAYING') return;
  const subDt = dt / STEPS;

  for (let s = 0; s < STEPS; s++) {
    onGround = false; groundPO = null;

    mVel.y += GRAV * subDt;
    mVel.addScaledVector(getForce(), subDt);

    // Horizontal speed cap
    const hs = Math.sqrt(mVel.x * mVel.x + mVel.z * mVel.z);
    if (hs > MAX_HS) { const f = MAX_HS / hs; mVel.x *= f; mVel.z *= f; }

    mPos.addScaledVector(mVel, subDt);

    // Collide
    for (const po of platObjs) {
      if (!po.active) continue;
      const [w, h, dep] = po.data.size;
      const r = sphereOBB(mPos, MR, po.mesh, w / 2, h / 2, dep / 2);
      if (r) {
        mPos.addScaledVector(r.normal, r.pen + 0.001);
        const vn = mVel.dot(r.normal);
        if (vn < 0) mVel.addScaledVector(r.normal, -vn * (1 + BOUNCE));
        if (r.normal.y > 0.55) {
          onGround = true; groundPO = po;
          if (po.type === 'moving') mPos.add(po.deltaMove);
        }
        if (po.type === 'disappearing' && !po.touched) { po.touched = true; po.fadeT = 0; }
      }
    }

    // Friction
    if (onGround) {
      const fr = Math.pow(FR_GND, subDt * 60);
      mVel.x *= fr; mVel.z *= fr;
      jumpCD = Math.max(0, jumpCD - subDt);
    } else {
      const fa = Math.pow(FR_AIR, subDt * 60);
      mVel.x *= fa; mVel.z *= fa;
    }
  }

  if (mMesh) mMesh.position.copy(mPos);

  // Visual rotation
  const spd = mVel.length();
  if (spd > 0.06) {
    const ax = new THREE.Vector3(-mVel.z, 0, mVel.x).normalize();
    mMesh.rotateOnWorldAxis(ax, spd * 0.016 / MR);
  }

  // Jump
  if (K['Space'] && onGround && jumpCD <= 0) {
    mVel.y = JUMP_IMP;
    jumpCD = 0.28;
    sfx('jump');
  }

  // Land
  if (onGround && !wasGround) {
    sfx('land');
    spawnParts(
      mPos.clone().add(new THREE.Vector3(0, -MR * 0.6, 0)),
      LEVELS[curLvl].col.p, 10, 3.5, 0.42
    );
  }
  wasGround = onGround;
}

// ═══════════════════════════════════════════════════════════════
// PLATFORM TICK
// ═══════════════════════════════════════════════════════════════
function tickPlatforms(dt) {
  const now = actx ? actx.currentTime : Date.now() * 0.001;
  for (const po of platObjs) {
    const pd = po.data;

    if (po.type === 'moving') {
      po.moveT += dt;
      const prev = po.mesh.position.clone();
      const off = Math.sin(po.moveT * (pd.speed || 1)) * (pd.range || 4);
      if (pd.axis === 'x')      po.mesh.position.x = pd.pos[0] + off;
      else if (pd.axis === 'z') po.mesh.position.z = pd.pos[2] + off;
      else                      po.mesh.position.y = pd.pos[1] + off;
      po.deltaMove.copy(po.mesh.position).sub(prev);
    }

    if (po.type === 'rotating') {
      po.mesh.rotation.y += (pd.rSpeed || 1) * dt;
    }

    if (po.type === 'disappearing') {
      if (po.touched && po.active) {
        po.fadeT += dt;
        const t = Math.min(po.fadeT / po.fadeDur, 1);
        po.alpha = 1 - t;
        // Flash warning in last half
        const flash = t > 0.45 ? (0.5 + 0.5 * Math.sin(now * (6 + t * 14) * Math.PI)) : 1;
        po.mesh.material.opacity = po.alpha * 0.74 * flash;
        // edge opacity
        if (po.mesh.children[0]) po.mesh.children[0].material.opacity = po.alpha * 0.92;
        if (po.fadeT >= po.fadeDur) {
          po.active = false; po.mesh.visible = false; po.respT = 0;
        }
      }
      if (!po.active) {
        po.respT += dt;
        if (po.respT >= po.respDur) {
          po.active = true; po.touched = false; po.fadeT = 0; po.alpha = 1;
          po.mesh.visible = true;
          po.mesh.material.opacity = 0.74;
          if (po.mesh.children[0]) po.mesh.children[0].material.opacity = 0.92;
        }
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// COLLECTIBLES / GOAL / CHECKPOINT
// ═══════════════════════════════════════════════════════════════
function tickCollectibles(dt) {
  const lv = LEVELS[curLvl];

  // Gems
  for (const g of gemObjs) {
    if (g.collected) continue;
    g.t += dt;
    g.mesh.position.y = g.base[1] + Math.sin(g.t * 2.25) * 0.19;
    g.core.rotation.y += dt * 1.55;
    g.core.rotation.x += dt * 0.75;
    g.r1.rotation.z   += dt * 1.1;
    g.r2.rotation.z   -= dt * 0.9;
    g.pl.intensity = 1.6 + 0.55 * Math.sin(g.t * 3.1);
    if (mPos.distanceTo(g.mesh.position) < GEM_DST) {
      g.collected = true; g.mesh.visible = false; gemsGot++;
      sfx('gem');
      spawnParts(g.mesh.position.clone(), lv.col.p, 32, 6.5, 0.85);
      doFlash('gem-flash', 380);
      showFloat(`✦ +${GEM_BON}s GEM!`, lv.col.p);
      updateHUD();
    }
  }

  // Checkpoint
  if (!cpPassed && cpO) {
    const cx = lv.cpPos[0], cz = lv.cpPos[2];
    const dx = mPos.x - cx, dz = mPos.z - cz;
    if (Math.sqrt(dx * dx + dz * dz) < CP_DST) {
      cpPassed = true;
      cpPos.set(...lv.cpPos);
      sfx('checkpoint');
      doFlash('resp-flash', 450);
    }
  }

  // Goal
  if (goalO) {
    goalO.ring1.rotation.z += dt * 0.85;
    goalO.ring2.rotation.z -= dt * 0.52;
    goalO.ring2.rotation.x += dt * 0.32;
    goalO.ring3.rotation.z += dt * 1.55;
    const gx = lv.goal[0], gz = lv.goal[2];
    const dx = mPos.x - gx, dz = mPos.z - gz;
    if (Math.sqrt(dx * dx + dz * dz) < GOAL_DST + 0.5) {
      levelComplete();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// FALL / RESPAWN
// ═══════════════════════════════════════════════════════════════
function checkFall() {
  if (!mMesh || gState !== 'PLAYING' || isFalling) return;
  if (mPos.y < FALL_Y) {
    isFalling = true; falls++; penalty += PENALTY;
    sfx('fall');
    doFlash('fall-flash', 750);
    updateHUD();
    setTimeout(() => {
      const rp = cpPassed ? cpPos : new THREE.Vector3(...LEVELS[curLvl].start);
      mPos.copy(rp); mVel.set(0, 0, 0);
      if (mMesh) mMesh.position.copy(mPos);
      trailP.length = 0;
      isFalling = false;
      sfx('respawn');
      doFlash('resp-flash', 500);
      spawnParts(mPos.clone(), LEVELS[curLvl].col.m, 22, 5.5, 0.65);
      showFloat(`▼ +${PENALTY}s PENALTY`, 0xff4444);
      updateHUD();
    }, 920);
  }
}

// ═══════════════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════════════
const _camIdeal = new THREE.Vector3();
const _camLook  = new THREE.Vector3();
function updateCamera() {
  if (!mMesh) return;
  const vh = mVel.clone(); vh.y = 0;
  const vl = Math.min(vh.length(), 3.5);
  vh.normalize().multiplyScalar(vl);
  _camIdeal.set(mPos.x - vh.x * 0.4, mPos.y + 9.5, mPos.z - 14.5 - vh.z * 0.25);
  camera.position.lerp(_camIdeal, CAM_LRP);
  _camLook.set(mPos.x + vh.x * 0.35, mPos.y + 1.2, mPos.z + vh.z * 0.35);
  camera.lookAt(_camLook);
}

// ═══════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════
function fmtTime(s) {
  const m  = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  const ms = Math.floor((s % 1) * 10);
  return `${m.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}.${ms}`;
}

function updateHUD() {
  const lv = LEVELS[curLvl];
  const hex = '#' + lv.col.p.toString(16).padStart(6, '0');
  const el  = id => document.getElementById(id);
  el('hud-time').textContent  = fmtTime(timer + penalty);
  el('hud-time').style.color  = hex;
  el('hud-lvl').textContent   = lv.name;
  el('hud-lvl').style.color   = hex;
  el('hud-gems').textContent  = `${gemsGot} / ${lv.totalGems}`;
  el('hud-gems').style.color  = hex;
  el('hud-falls').textContent = falls;
}

function doFlash(elId, ms = 600) {
  const el = document.getElementById(elId);
  el.style.display = 'block';
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = `fla ${ms * 0.001}s ease-out forwards`;
  setTimeout(() => (el.style.display = 'none'), ms + 50);
}

function showFloat(txt, color) {
  const el  = document.getElementById('floater');
  const hex = typeof color === 'number' ? '#' + color.toString(16).padStart(6, '0') : color;
  el.textContent = txt;
  el.style.color = hex;
  el.style.textShadow = `0 0 14px ${hex}`;
  el.style.display = 'block';
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'floatUp 1.5s ease-out forwards';
  setTimeout(() => (el.style.display = 'none'), 1520);
}

function id(s) { return document.getElementById(s); }

// ═══════════════════════════════════════════════════════════════
// GAME FLOW
// ═══════════════════════════════════════════════════════════════
function showTitle() {
  stopMusic(); gState = 'TITLE'; unloadLevel();
  id('title-screen').style.display = 'flex';
  id('hud').style.display = 'none';
  id('level-complete').style.display = 'none';
  id('end-screen').style.display = 'none';
  id('ctrl-hint').style.display = 'none';
}

function levelComplete() {
  if (gState !== 'PLAYING') return;
  gState = 'COMPLETE';
  stopMusic(); sfx('complete');

  const lv   = LEVELS[curLvl];
  const hex  = '#' + lv.col.p.toString(16).padStart(6, '0');
  const bonus = gemsGot * GEM_BON;
  const finalT = Math.max(0, timer + penalty - bonus);
  const rating = finalT <= lv.goldT ? '🥇' : finalT <= lv.silT ? '🥈' : '🥉';
  ratings[curLvl] = rating;
  if (finalT < bestT[curLvl]) bestT[curLvl] = finalT;

  id('lc-title').textContent  = lv.name + '  —  CLEAR';
  id('lc-title').style.color  = hex;
  id('lc-rating').textContent = rating;
  id('lc-time').textContent   = fmtTime(finalT);
  id('lc-gems').textContent   = `${gemsGot}/${lv.totalGems}`;
  id('lc-bonus').textContent  = `-${bonus.toFixed(1)}s`;

  const btns = id('lc-btns'); btns.innerHTML = '';
  const makeBtn = (label, col, fn) => {
    const b = document.createElement('button');
    b.className = 'abtn'; b.style.color = col; b.textContent = label;
    b.onclick = fn; btns.appendChild(b);
  };
  if (curLvl < LEVELS.length - 1) makeBtn('NEXT SECTOR ▶', hex, nextLevel);
  else makeBtn('VICTORY ▶', hex, showEndScreen);
  makeBtn('RETRY', '#558899', () => startGame(curLvl));
  makeBtn('MENU',  '#3a5566', showTitle);

  id('level-complete').style.display = 'flex';
  id('hud').style.display = 'none';

  spawnParts(mPos.clone(), lv.col.p, 65, 8, 1.6);
}

function showEndScreen() {
  id('level-complete').style.display = 'none';
  id('end-screen').style.display = 'flex';
  const grid = id('end-grid'); grid.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const hex = '#' + lv.col.p.toString(16).padStart(6, '0');
    const c   = document.createElement('div');
    c.className = 'end-card'; c.style.borderColor = hex;
    c.innerHTML = `<div class="ecn" style="color:${hex}">${lv.name}</div>
      <div class="ecr">${ratings[i] || '—'}</div>
      <div class="ect" style="color:${hex}">${bestT[i] < Infinity ? fmtTime(bestT[i]) : '—'}</div>`;
    grid.appendChild(c);
  });
}

function nextLevel() {
  if (curLvl < LEVELS.length - 1) startGame(curLvl + 1);
  else showEndScreen();
}

function startGame(li) {
  initAudio();
  if (actx && actx.state === 'suspended') actx.resume();
  curLvl = li; gState = 'PLAYING';
  id('title-screen').style.display = 'none';
  id('level-complete').style.display = 'none';
  id('end-screen').style.display = 'none';
  id('hud').style.display = 'flex';
  id('ctrl-hint').style.display = 'block';
  isFalling = false;
  loadLevel(li);
}

function toggleMute() {
  isMuted = !isMuted;
  id('mute-btn').textContent = isMuted ? '🔇' : '🔊';
  if (masterG) masterG.gain.value = isMuted ? 0 : 0.65;
  if (!isMuted && gState === 'PLAYING') startMusic(curLvl);
  else if (isMuted) stopMusic();
}

// Expose to global
window.startGame = startGame;
window.showTitle = showTitle;
window.nextLevel = nextLevel;
window.toggleMute = toggleMute;

// ═══════════════════════════════════════════════════════════════
// INIT PARTICLES
// ═══════════════════════════════════════════════════════════════
initParticles();

// ═══════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
let titleT = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (gState === 'PLAYING') {
    timer += dt;
    tickPlatforms(dt);
    physicsStep(dt);
    checkFall();
    tickCollectibles(dt);
    tickParts(dt);
    if (mMesh) updateTrail();
    updateCamera();
    if (rollOsc) updateRoll(mVel.length());
    id('hud-time').textContent = fmtTime(timer + penalty);

    // Pulse marble glow
    if (mPtL)  mPtL.intensity  = 2.6 + 0.55 * Math.sin(Date.now() * 0.004);
    if (mGlowM) mGlowM.material.opacity = 0.10 + 0.045 * Math.sin(Date.now() * 0.006);

  } else if (gState === 'TITLE') {
    titleT += dt;
    camera.position.set(
      Math.sin(titleT * 0.18) * 22,
      10 + Math.sin(titleT * 0.1) * 3,
      Math.cos(titleT * 0.18) * 22
    );
    camera.lookAt(0, 0, 10);
    tickParts(dt);
  }

  renderer.render(scene, camera);
}
animate();

// ═══════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
