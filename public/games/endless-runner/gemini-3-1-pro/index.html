<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Generated by Gemini 3.1 Pro Engine -->
  <meta name="author" content="Gemini 3.1 Pro">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Runner 3D</title>
    <style>
  /* Gemini 3.1 Pro Enhanced Aesthetics */
  body { background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%) !important; color: #fff; }
  canvas { box-shadow: 0 0 25px rgba(0, 255, 200, 0.4) !important; border-radius: 12px !important; transition: all 0.3s ease; }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 24px;
        }
        #gameOver {
            position: absolute;
            color: #00ffff;
            font-size: 48px;
            text-align: center;
            display: none;
        }
        #gameOver button {
            font-size: 24px;
            background-color: #00ffff;
            border: none;
            color: #050510;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <div id="gameOver">
        Game Over<br>
        <span id="finalScore"></span><br>
        <button id="restart">Restart</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreEl = document.getElementById('score');
            const gameOverEl = document.getElementById('gameOver');
            const finalScoreEl = document.getElementById('finalScore');
            const restartBtn = document.getElementById('restart');

            let width, height;
            let score = 0;
            let speed = 5;
            let gameRunning = true;

            const player = {
                lane: 1, // 0, 1, 2
                z: 0,
                y: 150,
                isJumping: false,
                jumpHeight: 0,
                jumpSpeed: 20,
                gravity: -2
            };

            const lanes = [-200, 0, 200];
            const horizon = 100;
            const vanishingPoint = { x: 0, y: 0 };

            let obstacles = [];
            let coins = [];

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                vanishingPoint.x = width / 2;
                vanishingPoint.y = height / 2 - horizon;
            }

            function project(p) {
                const scale = 500 / (500 + p.z);
                return {
                    x: vanishingPoint.x + p.x * scale,
                    y: vanishingPoint.y + p.y * scale,
                    scale: scale
                };
            }

            function generateObjects() {
                // Obstacles
                if (Math.random() < 0.02) {
                    obstacles.push({
                        lane: Math.floor(Math.random() * 3),
                        z: 3000,
                        y: 150,
                        width: 100,
                        height: 100
                    });
                }
                // Coins
                if (Math.random() < 0.05) {
                    coins.push({
                        lane: Math.floor(Math.random() * 3),
                        z: 3000,
                        y: 100,
                        radius: 20
                    });
                }
            }

            function update() {
                if (!gameRunning) return;

                speed += 0.001;

                // Player jump
                if (player.isJumping) {
                    player.jumpHeight += player.jumpSpeed;
                    player.jumpSpeed += player.gravity;
                    if (player.jumpHeight <= 0) {
                        player.isJumping = false;
                        player.jumpHeight = 0;
                        player.jumpSpeed = 20;
                    }
                }

                // Move obstacles and coins
                obstacles.forEach(o => o.z -= speed);
                coins.forEach(c => c.z -= speed);

                // Remove off-screen objects
                obstacles = obstacles.filter(o => o.z > -10);
                coins = coins.filter(c => c.z > -10);

                // Collision detection
                const playerY = player.y - player.jumpHeight;
                obstacles.forEach(o => {
                    if (o.lane === player.lane && o.z < 50 && o.z > -50 && playerY < o.y + o.height / 2 && playerY > o.y - o.height / 2) {
                        endGame();
                    }
                });

                coins.forEach((c, i) => {
                    if (c.lane === player.lane && c.z < 50 && c.z > -50 && playerY < c.y + c.radius && playerY > c.y - c.radius) {
                        score += 10;
                        scoreEl.textContent = score;
                        coins.splice(i, 1);
                    }
                });

                generateObjects();
                score++;
                scoreEl.textContent = score;
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);

                // Draw floor lines
                ctx.strokeStyle = '#00ffff';
                for (let i = 0; i < 30; i++) {
                    const p1 = project({ x: -1000, y: 150, z: i * 100 });
                    const p2 = project({ x: 1000, y: 150, z: i * 100 });
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
                
                // Draw lane lines
                const laneLines = [-300, -100, 100, 300];
                laneLines.forEach(lx => {
                    const p1 = project({ x: lx, y: 150, z: 0 });
                    const p2 = project({ x: lx, y: 150, z: 3000 });
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                });


                // Draw obstacles
                ctx.fillStyle = '#ff0000';
                obstacles.forEach(o => {
                    const p = project({ x: lanes[o.lane], y: o.y, z: o.z });
                    const w = o.width * p.scale;
                    const h = o.height * p.scale;
                    ctx.fillRect(p.x - w / 2, p.y - h / 2, w, h);
                });

                // Draw coins
                ctx.fillStyle = '#ffff00';
                coins.forEach(c => {
                    const p = project({ x: lanes[c.lane], y: c.y, z: c.z });
                    const r = c.radius * p.scale;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Draw player
                ctx.fillStyle = '#00ffff';
                const playerP = project({ x: lanes[player.lane], y: player.y - player.jumpHeight, z: player.z });
                ctx.fillRect(playerP.x - 25, playerP.y - 50, 50, 100);

                requestAnimationFrame(draw);
            }

            function loop() {
                update();
                if (gameRunning) {
                    setTimeout(loop, 1000 / 60);
                }
            }

            function handleInput(e) {
                if (!gameRunning) return;
                switch (e.code) {
                    case 'ArrowLeft':
                    case 'KeyA':
                        if (player.lane > 0) player.lane--;
                        break;
                    case 'ArrowRight':
                    case 'KeyD':
                        if (player.lane < 2) player.lane++;
                        break;
                    case 'Space':
                    case 'ArrowUp':
                        if (!player.isJumping) player.isJumping = true;
                        break;
                }
            }

            function endGame() {
                gameRunning = false;
                gameOverEl.style.display = 'block';
                finalScoreEl.textContent = `Score: ${score}`;
            }

            function restartGame() {
                score = 0;
                speed = 5;
                player.lane = 1;
                player.isJumping = false;
                player.jumpHeight = 0;
                obstacles = [];
                coins = [];
                gameRunning = true;
                gameOverEl.style.display = 'none';
                scoreEl.textContent = score;
                loop();
            }

            window.addEventListener('resize', resize);
            window.addEventListener('keydown', handleInput);
            restartBtn.addEventListener('click', restartGame);

            resize();
            loop();
            draw();
        })();
    </script>
</body>
</html>
