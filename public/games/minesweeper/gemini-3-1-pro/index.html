<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Generated by Gemini 3.1 Pro Engine -->
  <meta name="author" content="Gemini 3.1 Pro">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <style>
  /* Gemini 3.1 Pro Enhanced Aesthetics */
  body { background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%) !important; color: #fff; }
  canvas { box-shadow: 0 0 25px rgba(0, 255, 200, 0.4) !important; border-radius: 12px !important; transition: all 0.3s ease; }

        :root {
            --bg-color: #0a0a1a;
            --primary-neon: #ff3366;
            --border-color: rgba(255, 51, 102, 0.3);
            --cell-bg: #1a1a2a;
            --cell-revealed-bg: #0f0f1f;
            --text-color: #eee;

            --color-1: #00ffff; /* cyan */
            --color-2: #00ff00; /* green */
            --color-3: #ff0000; /* red */
            --color-4: #0000ff; /* blue */
            --color-5: #ff00ff; /* magenta */
            --color-6: #008080; /* teal */
            --color-7: #ffffff; /* white */
            --color-8: #808080; /* gray */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 2vmin;
        }

        header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 90vmin;
            padding: 2vmin;
            margin-bottom: 2vmin;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 4vmin;
        }

        #status-bar span {
            margin: 0 1.5vmin;
        }

        #restart-btn {
            background: transparent;
            border: 1px solid var(--primary-neon);
            color: var(--primary-neon);
            padding: 0.5vmin 1.5vmin;
            border-radius: 5px;
            cursor: pointer;
            font-size: 3.5vmin;
            transition: background 0.3s, color 0.3s;
        }

        #restart-btn:hover {
            background: var(--primary-neon);
            color: var(--bg-color);
        }

        #grid {
            display: grid;
            width: 90vmin;
            height: 90vmin;
            border: 2px solid var(--primary-neon);
            box-shadow: 0 0 20px var(--primary-neon);
        }

        .cell {
            background-color: var(--cell-bg);
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5vmin;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            user-select: none;
        }

        .cell:hover {
            background-color: #2a2a3a;
        }

        .cell.revealed {
            background-color: var(--cell-revealed-bg);
            cursor: default;
        }
        
        .cell.revealed.mine {
            background-color: red;
            animation: explode 0.5s forwards;
        }

        .cell.flagged {
            font-size: 4vmin;
        }

        .cell[data-adjacent="1"] { color: var(--color-1); }
        .cell[data-adjacent="2"] { color: var(--color-2); }
        .cell[data-adjacent="3"] { color: var(--color-3); }
        .cell[data-adjacent="4"] { color: var(--color-4); }
        .cell[data-adjacent="5"] { color: var(--color-5); }
        .cell[data-adjacent="6"] { color: var(--color-6); }
        .cell[data-adjacent="7"] { color: var(--color-7); }
        .cell[data-adjacent="8"] { color: var(--color-8); }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s 0.5s, opacity 0.5s;
        }

        #overlay.visible {
            visibility: visible;
            opacity: 1;
            transition: visibility 0s, opacity 0.5s;
        }

        #message {
            font-size: 10vmin;
            color: var(--primary-neon);
            text-shadow: 0 0 15px var(--primary-neon);
            margin-bottom: 4vmin;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.7; }
            100% { transform: scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <header>
            <div id="status-bar">
                <span>🚩 <span id="mine-counter">40</span></span>
                <span>⏱️ <span id="timer">0</span></span>
            </div>
            <button id="restart-btn">Restart</button>
        </header>
        <div id="grid"></div>
    </div>

    <div id="overlay">
        <div id="message">You Win!</div>
        <button id="overlay-restart-btn" class="restart-btn">Play Again</button>
    </div>

    <script>
        (function() {
            const GRID_SIZE = 16;
            const NUM_MINES = 40;

            const grid = document.getElementById('grid');
            const mineCounterEl = document.getElementById('mine-counter');
            const timerEl = document.getElementById('timer');
            const restartBtn = document.getElementById('restart-btn');
            const overlay = document.getElementById('overlay');
            const messageEl = document.getElementById('message');
            const overlayRestartBtn = document.getElementById('overlay-restart-btn');

            let board = [];
            let gameOver = false;
            let firstClick = true;
            let minesPlaced = false;
            let flags = 0;
            let timerInterval;
            let time = 0;

            function init() {
                grid.innerHTML = '';
                grid.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
                grid.style.gridTemplateRows = `repeat(${GRID_SIZE}, 1fr)`;
                
                board = [];
                gameOver = false;
                firstClick = true;
                minesPlaced = false;
                flags = 0;
                time = 0;

                mineCounterEl.textContent = NUM_MINES;
                timerEl.textContent = time;
                overlay.classList.remove('visible');
                
                clearInterval(timerInterval);

                for (let r = 0; r < GRID_SIZE; r++) {
                    const row = [];
                    for (let c = 0; c < GRID_SIZE; c++) {
                        const cell = document.createElement('div');
                        cell.classList.add('cell');
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        grid.appendChild(cell);
                        row.push({
                            element: cell,
                            row: r,
                            col: c,
                            isMine: false,
                            isRevealed: false,
                            isFlagged: false,
                            adjacentMines: 0
                        });
                    }
                    board.push(row);
                }
                
                
            }

            function startTimer() {
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    time++;
                    timerEl.textContent = time;
                }, 1000);
            }

            function placeMines(firstClickRow, firstClickCol) {
                let minesToPlace = NUM_MINES;
                while (minesToPlace > 0) {
                    const r = Math.floor(Math.random() * GRID_SIZE);
                    const c = Math.floor(Math.random() * GRID_SIZE);

                    if (!board[r][c].isMine && !(r === firstClickRow && c === firstClickCol)) {
                        board[r][c].isMine = true;
                        minesToPlace--;
                    }
                }

                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (!board[r][c].isMine) {
                            board[r][c].adjacentMines = countAdjacentMines(r, c);
                        }
                    }
                }
                minesPlaced = true;
            }

            function countAdjacentMines(row, col) {
                let count = 0;
                for (let r = -1; r <= 1; r++) {
                    for (let c = -1; c <= 1; c++) {
                        if (r === 0 && c === 0) continue;
                        const newRow = row + r;
                        const newCol = col + c;
                        if (newRow >= 0 && newRow < GRID_SIZE && newCol >= 0 && newCol < GRID_SIZE && board[newRow][newCol].isMine) {
                            count++;
                        }
                    }
                }
                return count;
            }

            function handleCellClick(e) {
                if (gameOver) return;
                const cellEl = e.target.closest('.cell');
                if (!cellEl) return;

                const row = parseInt(cellEl.dataset.row);
                const col = parseInt(cellEl.dataset.col);
                const cell = board[row][col];

                if (cell.isFlagged || cell.isRevealed) return;

                if (firstClick) {
                    placeMines(row, col);
                    startTimer();
                    firstClick = false;
                }

                if (cell.isMine) {
                    endGame(false);
                    return;
                }

                revealCell(row, col);
                checkWin();
            }

            function handleCellRightClick(e) {
                e.preventDefault();
                if (gameOver) return;
                if (firstClick) return;

                const cellEl = e.target.closest('.cell');
                if (!cellEl) return;

                const row = parseInt(cellEl.dataset.row);
                const col = parseInt(cellEl.dataset.col);
                const cell = board[row][col];

                if (cell.isRevealed) return;

                cell.isFlagged = !cell.isFlagged;
                if (cell.isFlagged) {
                    cell.element.textContent = '🚩';
                    cell.element.classList.add('flagged');
                    flags++;
                } else {
                    cell.element.textContent = '';
                    cell.element.classList.remove('flagged');
                    flags--;
                }
                mineCounterEl.textContent = NUM_MINES - flags;
            }

            function revealCell(row, col) {
                if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) return;
                const cell = board[row][col];
                if (cell.isRevealed || cell.isFlagged) return;

                cell.isRevealed = true;
                cell.element.classList.add('revealed');

                if (cell.adjacentMines > 0) {
                    cell.element.textContent = cell.adjacentMines;
                    cell.element.dataset.adjacent = cell.adjacentMines;
                } else {
                    // Flood fill
                    for (let r = -1; r <= 1; r++) {
                        for (let c = -1; c <= 1; c++) {
                            revealCell(row + r, col + c);
                        }
                    }
                }
            }

            function checkWin() {
                let revealedCount = 0;
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (board[r][c].isRevealed) {
                            revealedCount++;
                        }
                    }
                }
                if (revealedCount === GRID_SIZE * GRID_SIZE - NUM_MINES) {
                    endGame(true);
                }
            }

            function endGame(isWin) {
                gameOver = true;
                clearInterval(timerInterval);
                grid.removeEventListener('click', handleCellClick);
                grid.removeEventListener('contextmenu', handleCellRightClick);

                if (isWin) {
                    messageEl.textContent = 'You Win!';
                } else {
                    messageEl.textContent = 'Game Over';
                    // Reveal all mines
                    board.forEach(row => {
                        row.forEach(cell => {
                            if (cell.isMine) {
                                cell.element.classList.add('revealed', 'mine');
                                cell.element.textContent = '💣';
                            }
                        });
                    });
                }
                setTimeout(() => overlay.classList.add('visible'), isWin ? 500 : 1500);
            }

            restartBtn.addEventListener('click', init);
            overlayRestartBtn.addEventListener('click', init);
            
            // Touch support for flagging
            let touchTimeout;
            grid.addEventListener('touchstart', (e) => {
                if (gameOver) return;
                const cellEl = e.target.closest('.cell');
                if (!cellEl) return;
                
                touchTimeout = setTimeout(() => {
                    handleCellRightClick(e);
                    e.preventDefault(); // Prevent click after long press
                }, 500); // 500ms for a long press
            });

            grid.addEventListener('touchend', (e) => {
                clearTimeout(touchTimeout);
            });
            
            grid.addEventListener('touchmove', (e) => {
                clearTimeout(touchTimeout);
            });


            grid.addEventListener('click', handleCellClick);
            grid.addEventListener('contextmenu', handleCellRightClick);
            init();
        })();
    </script>
</body>
</html>
