    <style>
  /* Gemini 3.1 Pro Enhanced Aesthetics */

        :root {
            --background-color: #050510;

            --tile-default-bg: #3d3d4d;

            --font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--background-color);
            color: var(--primary-neon);
            font-family: var(--font-family);
            display: flex;

        .game-container {
            display: flex;

            display: flex;

        h1 {
            font-size: 3rem;

        }

        .scores {
            display: flex;

        }

        .score-box {
            background: var(--grid-background);

        .score-box .label {
            font-size: 0.8rem;

            text-transform: uppercase;

        .score-box .value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .score-addition {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            font-weight: bold;
            color: #4caf50;
            opacity: 0;
            animation: score-pop 1s ease-out;
        }

        @keyframes score-pop {
            0% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -40px); }
        }

        .controls {
            width: 100%;
            text-align: right;
        }

        #new-game-btn {
            background: var(--primary-neon);
            color: var(--background-color);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            text-shadow: none;
        }

        #new-game-btn:hover {
            background: #ffd633;
        }

        .grid-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--grid-background);
            border-radius: 10px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
            position: relative;
        }

        .grid-cell {
            background: var(--tile-default-bg);
            border-radius: 5px;
        }

        .tile {
            position: absolute;
            width: calc(25% - 11.25px);
            height: calc(25% - 11.25px);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 2rem;
            transition: transform 0.1s ease-in-out, top 0.1s ease-in-out, left 0.1s ease-in-out;
            animation: tile-spawn 0.2s ease;
        }
        
        @keyframes tile-spawn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        
        .tile.merged {
            animation: tile-merge 0.2s ease;
        }

        @keyframes tile-merge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Tile Colors */
        .tile[data-value="2"] { background-color: #4a4a5a; color: #e0e0e0; }
        .tile[data-value="4"] { background-color: #5a5a6a; color: #e0e0e0; }
        .tile[data-value="8"] { background-color: #f9a825; color: #ffffff; }
        .tile[data-value="16"] { background-color: #f57f17; color: #ffffff; }
        .tile[data-value="32"] { background-color: #e65100; color: #ffffff; }
        .tile[data-value="64"] { background-color: #d84315; color: #ffffff; }
        .tile[data-value="128"] { background-color: #cddc39; color: #ffffff; text-shadow: 0 0 3px #000; }
        .tile[data-value="256"] { background-color: #8bc34a; color: #ffffff; text-shadow: 0 0 3px #000; }
        .tile[data-value="512"] { background-color: #4dd0e1; color: #ffffff; text-shadow: 0 0 3px #000; }
        .tile[data-value="1024"] { background-color: #29b6f6; color: #ffffff; text-shadow: 0 0 3px #000; }
        .tile[data-value="2048"] {
            background-color: var(--primary-neon);
            color: #000;
            box-shadow: 0 0 15px var(--primary-neon);
            animation: tile-merge 0.2s ease, win-glow 1s infinite alternate;
        }
        .tile[data-value="4096"] { background-color: #ab47bc; color: #ffffff; box-shadow: 0 0 15px #ab47bc; }
        .tile[data-value="8192"] { background-color: #7e57c2; color: #ffffff; box-shadow: 0 0 15px #7e57c2; }

        @keyframes win-glow {
            from { box-shadow: 0 0 15px var(--primary-neon); }
            to { box-shadow: 0 0 30px var(--primary-neon), 0 0 10px #fff; }
        }

        .tile[data-value="128"], .tile[data-value="256"], .tile[data-value="512"], .tile[data-value="1024"], .tile[data-value="2048"] {
            font-size: 1.8rem;
        }
        .tile[data-value="4096"], .tile[data-value="8192"] {
            font-size: 1.6rem;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 5, 16, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .game-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .game-overlay h2 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--primary-neon);
        }
        
        .game-overlay#game-over-overlay h2 {
            color: #f44336;
            text-shadow: 0 0 10px #f44336;
        }

        .overlay-buttons {
            display: flex;
            gap: 15px;
        }

        .overlay-buttons button {
            background: var(--primary-neon);
            color: var(--background-color);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .overlay-buttons button:hover {
            background: #ffd633;

<body>

    <div class="game-container">
        <div class="header">
            <h1>2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="label">Score</div>
                    <div id="score" class="value">0</div>
                    <div id="score-addition-container"></div>
                </div>
                <div class="score-box">
                    <div class="label">Best</div>
                    <div id="best-score" class="value">0</div>
                </div>
            </div>
        </div>
        <div class="controls">
            <button id="new-game-btn">New Game</button>
        </div>
        <div class="grid-container" id="grid-container">
            <!-- Grid cells are generated by JS -->
            <!-- Tiles are generated by JS -->
        </div>
    </div>

    <div id="win-overlay" class="game-overlay">
        <h2>You Win!</h2>
        <div class="overlay-buttons">
            <button id="win-continue-btn">Continue</button>
            <button id="win-new-game-btn">New Game</button>
        </div>
    </div>

    <div id="game-over-overlay" class="game-overlay">
        <h2>Game Over</h2>
        <div class="overlay-buttons">
            <button id="game-over-new-game-btn">Try Again</button>
        </div>
    </div>

    <script>
    (function() {
        const GRID_SIZE = 4;
        const gridContainer = document.getElementById('grid-container');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const scoreAdditionContainer = document.getElementById('score-addition-container');
        const newGameBtn = document.getElementById('new-game-btn');
        const winOverlay = document.getElementById('win-overlay');
        const gameOverOverlay = document.getElementById('game-over-overlay');

        let grid = [];
        let score = 0;
        let bestScore = 0;
        let isGameOver = false;
        let hasWon = false;

        function setupGrid() {
            gridContainer.innerHTML = '';
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.classList.add('grid-cell');
                gridContainer.appendChild(cell);
            }
        }

        function initializeGame() {
            grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
            score = 0;
            isGameOver = false;
            hasWon = false;
            winOverlay.classList.remove('visible');
            gameOverOverlay.classList.remove('visible');
            
            addRandomTile();
            addRandomTile();
            updateBestScore(0);
            updateScore(0);
            renderGrid();
        }

        function renderGrid() {
            // Clear existing tiles
            const existingTiles = gridContainer.querySelectorAll('.tile');
            existingTiles.forEach(tile => tile.remove());

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] !== 0) {
                        createTile(r, c, grid[r][c]);
                    }
                }
            }
        }

        function createTile(row, col, value, isMerged = false) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            if (isMerged) {
                tile.classList.add('merged');
            }
            tile.dataset.value = value;
            tile.textContent = value;
            
            const tilePos = getTilePosition(row, col);
            tile.style.top = `${tilePos.top}px`;
            tile.style.left = `${tilePos.left}px`;

            gridContainer.appendChild(tile);
        }
        
        function getTilePosition(row, col) {
            const gridRect = gridContainer.getBoundingClientRect();
            const cellWidth = gridRect.width / GRID_SIZE;
            const gap = (gridContainer.clientWidth - (cellWidth * GRID_SIZE)) / (GRID_SIZE + 1);
            
            const left = gap + col * (cellWidth - gap/2.2);
            const top = gap + row * (cellWidth - gap/2.2);
            
            return { top, left };
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === 0) {
                        emptyCells.push({ r, c });
                    }
                }
            }

            if (emptyCells.length > 0) {
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                grid[r][c] = value;
            }
        }

        function updateScore(points) {
            score += points;
            scoreEl.textContent = score;
            if (points > 0) {
                const additionEl = document.createElement('div');
                additionEl.classList.add('score-addition');
                additionEl.textContent = `+${points}`;
                scoreAdditionContainer.appendChild(additionEl);
                setTimeout(() => additionEl.remove(), 1000);
            }
            if (score > bestScore) {
                updateBestScore(score);
            }
        }

        function updateBestScore(newBest) {
            bestScore = newBest;
            bestScoreEl.textContent = bestScore;
        }

        function move(direction) {
            if (isGameOver) return;

            let moved = false;
            let scoreGained = 0;
            
            const tempGrid = JSON.parse(JSON.stringify(grid));

            // 0: up, 1: right, 2: down, 3: left
            if (direction === 0 || direction === 2) { // Up or Down
                for (let c = 0; c < GRID_SIZE; c++) {
                    const col = grid.map(row => row[c]);
                    const { newCol, points } = slideAndMerge(col, direction === 2);
                    scoreGained += points;
                    for (let r = 0; r < GRID_SIZE; r++) {
                        if (grid[r][c] !== newCol[r]) moved = true;
                        grid[r][c] = newCol[r];
                    }
                }
            } else { // Left or Right
                for (let r = 0; r < GRID_SIZE; r++) {
                    const row = grid[r];
                    const { newCol, points } = slideAndMerge(row, direction === 1);
                    scoreGained += points;
                    if (grid[r].toString() !== newCol.toString()) moved = true;
                    grid[r] = newCol;
                }
            }

            if (moved) {
                updateScore(scoreGained);
                addRandomTile();
                renderGrid();
                if (checkWinCondition() && !hasWon) {
                    hasWon = true;
                    setTimeout(() => winOverlay.classList.add('visible'), 500);
                }
                if (checkGameOver()) {
                    isGameOver = true;
                    setTimeout(() => gameOverOverlay.classList.add('visible'), 500);
                }
            }
        }

        function slideAndMerge(line, reverse) {\n            const workingLine = reverse ? [...line].reverse() : [...line];\n            let newLine = workingLine.filter(v => v !== 0);
            let points = 0;

            // Merge tiles
            for (let i = 0; i < newLine.length - 1; i++) {
                if (newLine[i] === newLine[i + 1]) {
                    newLine[i] *= 2;
                    points += newLine[i];
                    newLine.splice(i + 1, 1);
                }
            }

            // Pad with zeros
            while (newLine.length < GRID_SIZE) {
                newLine.push(0);
            }

            if (reverse) newLine.reverse();
            return { newCol: newLine, points };
        }
        
        function checkWinCondition() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === 2048) return true;
                }
            }
            return false;
        }

        function checkGameOver() {
            // Check for empty cells
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === 0) return false;
                }
            }
            // Check for possible merges
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (c < GRID_SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
                    if (r < GRID_SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
                }
            }
            return true;
        }

        // Event Listeners
        document.addEventListener('keydown', e => {
            switch (e.key) {
                case 'ArrowUp': case 'w': move(0); break;
                case 'ArrowRight': case 'd': move(1); break;
                case 'ArrowDown': case 's': move(2); break;
                case 'ArrowLeft': case 'a': move(3); break;
            }
        });

        newGameBtn.addEventListener('click', initializeGame);
        document.getElementById('win-new-game-btn').addEventListener('click', initializeGame);
        document.getElementById('game-over-new-game-btn').addEventListener('click', initializeGame);
        document.getElementById('win-continue-btn').addEventListener('click', () => {
            winOverlay.classList.remove('visible');
        });

        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        gridContainer.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        gridContainer.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        });

        function handleSwipe() {
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) > 30) { // Threshold
                if (absDx > absDy) {
                    // Horizontal swipe
                    move(dx > 0 ? 1 : 3);
                } else {
                    // Vertical swipe
                    move(dy > 0 ? 2 : 0);
                }
            }
        }
        
        // Initial setup
        setupGrid();
        initializeGame();
    })();
    </script>
</body>
