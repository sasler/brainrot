<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <style>
    body { background: #050510; color: #e4e4ef; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    #ui { position: fixed; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; z-index: 10; padding: 0 20px;}
    .screen { position: fixed; inset: 0; background: rgba(5,5,16,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
    button { background: transparent; border: 1px solid #0ff; color: #0ff; padding: 10px 20px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; background: #222; padding: 10px; border-radius: 5px; }
    .cell { width: 80px; height: 80px; background: #333; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="ui"><span>SCORE: <span id="s">0</span></span><span id="st">READY</span></div>
  <div id="start" class="screen"><h1>2048</h1><button onclick="st()">START</button></div>
  <div id="over" class="screen" style="display:none;"><h1>GAME OVER</h1><p>Final: <span id="fs">0</span></p><button onclick="st()">RETRY</button></div>
  <div class="grid" id="grid"></div>
  <script>
    let b=[], sc=0, run=false;
    function st() {
      document.getElementById('start').style.display='none'; document.getElementById('over').style.display='none';
      b=Array(16).fill(0); sc=0; run=true; add(); add(); draw();
      document.getElementById('st').innerText='PLAYING'; document.getElementById('s').innerText=sc;
    }
    function add() { let e=b.map((v,i)=>v==0?i:-1).filter(v=>v!=-1); if(e.length) b[e[Math.random()*e.length|0]]=Math.random()<0.9?2:4; }
    function draw() {
      const g = document.getElementById('grid'); g.innerHTML='';
      b.forEach(v=>{ let d=document.createElement('div'); d.className='cell'; if(v) d.innerText=v; d.style.color=v>4?'#0ff':'#fff'; g.appendChild(d); });
    }
    window.addEventListener('keydown', e=>{
      if(!run) { if(e.key==' ') st(); return; }
      let moved=false, nb=[...b];
      const slide = (arr) => {
        let f=arr.filter(v=>v);
        for(let i=0;i<f.length-1;i++) { if(f[i]==f[i+1]) { f[i]*=2; f[i+1]=0; sc+=f[i]; } }
        f=f.filter(v=>v); while(f.length<4) f.push(0); return f;
      };
      if(e.key=='ArrowLeft') { for(let i=0;i<4;i++) { let row=slide(nb.slice(i*4, i*4+4)); for(let j=0;j<4;j++) nb[i*4+j]=row[j]; } }
      else if(e.key=='ArrowRight') { for(let i=0;i<4;i++) { let row=slide(nb.slice(i*4, i*4+4).reverse()).reverse(); for(let j=0;j<4;j++) nb[i*4+j]=row[j]; } }
      else if(e.key=='ArrowUp') { for(let j=0;j<4;j++) { let col=slide([nb[j],nb[j+4],nb[j+8],nb[j+12]]); for(let i=0;i<4;i++) nb[i*4+j]=col[i]; } }
      else if(e.key=='ArrowDown') { for(let j=0;j<4;j++) { let col=slide([nb[j],nb[j+4],nb[j+8],nb[j+12]].reverse()).reverse(); for(let i=0;i<4;i++) nb[i*4+j]=col[i]; } }
      if(nb.some((v,i)=>v!=b[i])) { b=nb; add(); draw(); document.getElementById('s').innerText=sc; }
      else if(!b.includes(0)) { 
        let m=true;
        for(let i=0;i<4;i++)for(let j=0;j<4;j++) {
          if((j<3 && b[i*4+j]==b[i*4+j+1]) || (i<3 && b[i*4+j]==b[(i+1)*4+j])) m=false;
        }
        if(m) { run=false; document.getElementById('over').style.display='flex'; document.getElementById('fs').innerText=sc; document.getElementById('st').innerText='OVER'; }
      }
      if(b.includes(2048) && run) { run=false; document.getElementById('over').style.display='flex'; document.getElementById('fs').innerText=sc; document.getElementById('over').querySelector('h1').innerText='YOU WIN!'; document.getElementById('st').innerText='WIN'; }
    });
  </script>
</body>
</html>
