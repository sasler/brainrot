<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048 · BrainRot Games</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050510;
      color: #e4e4ef;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 25% 20%, rgba(0, 180, 255, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 75% 80%, rgba(180, 0, 255, 0.04) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.012) 59px, rgba(255,255,255,0.012) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.012) 59px, rgba(255,255,255,0.012) 60px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Game Container ── */
    #game-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: min(92vw, 460px);
      max-height: 100vh;
      padding: 8px 0;
    }

    /* ── Header ── */
    #header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #game-title {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #00e0ff 0%, #a040ff 50%, #ff4080 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #scores { display: flex; gap: 8px; }

    .score-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 5px 14px 7px;
      text-align: center;
      min-width: 76px;
    }

    .score-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #4a4a6a;
      margin-bottom: 1px;
    }

    .score-value {
      font-size: 1.15rem;
      font-weight: 800;
      color: #00e0ff;
      font-variant-numeric: tabular-nums;
      transition: color 0.15s;
    }

    .score-value.bumped { color: #fff; }

    /* ── Controls ── */
    #controls {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #6a6a8a;
      padding: 5px 13px;
      font-size: 11px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 7px;
      transition: all 0.2s;
    }

    .ctrl-btn:hover:not(:disabled) {
      border-color: rgba(0,224,255,0.4);
      color: #00e0ff;
      box-shadow: 0 0 14px rgba(0,224,255,0.1);
    }

    .ctrl-btn:disabled { opacity: 0.25; cursor: default; }

    /* ── Grid ── */
    #grid-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: rgba(255,255,255,0.025);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3), 0 0 60px rgba(0,180,255,0.02);
      overflow: hidden;
    }

    #grid {
      position: absolute;
      inset: 0;
    }

    .cell {
      position: absolute;
      background: rgba(255,255,255,0.022);
      border-radius: 10px;
    }

    /* ── Tiles ── */
    .tile {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-weight: 900;
      font-family: 'Segoe UI', system-ui, sans-serif;
      transition: top 110ms ease-in-out, left 110ms ease-in-out;
      z-index: 2;
      will-change: top, left;
    }

    .tile.merged {
      animation: pop 180ms cubic-bezier(0.18, 0.89, 0.32, 1.28);
      z-index: 3;
    }

    .tile.spawned {
      animation: spawn 180ms cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }

    @keyframes spawn {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); }
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.22); }
      100% { transform: scale(1); }
    }

    /* ── Score Popup ── */
    .score-pop {
      position: absolute;
      font-size: 13px;
      font-weight: 800;
      pointer-events: none;
      z-index: 10;
      animation: floatUp 550ms ease-out forwards;
      text-shadow: 0 0 8px currentColor;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-36px) scale(0.85); }
    }

    /* ── Screens ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5,5,16,0.93);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 20;
      opacity: 1;
      transition: opacity 0.25s;
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .screen h1 {
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      margin-bottom: 0.3rem;
      line-height: 1.1;
    }

    #start-screen h1,
    #gameover-screen h1 {
      background: linear-gradient(135deg, #00e0ff, #a040ff, #ff4080);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #win-screen h1 {
      background: linear-gradient(135deg, #ffd700, #ffaa00, #ff6600);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,200,0,0.35));
    }

    .screen .subtitle {
      color: #4a4a6a;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 1.8rem;
    }

    .screen .info {
      color: #5a5a7a;
      font-size: 13px;
      line-height: 1.7;
      text-align: center;
      max-width: 280px;
      margin-bottom: 1.8rem;
    }

    .screen .final-score {
      font-size: 1.3rem;
      color: #6a6a8a;
      margin-bottom: 1.6rem;
    }

    .screen .final-score span {
      color: #00e0ff;
      font-weight: 800;
    }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    .btn {
      background: transparent;
      border: 1px solid rgba(0,224,255,0.25);
      color: #00e0ff;
      padding: 12px 36px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.18em;
      cursor: pointer;
      transition: all 0.25s;
      border-radius: 10px;
    }

    .btn:hover {
      border-color: #00e0ff;
      box-shadow: 0 0 28px rgba(0,224,255,0.18);
      background: rgba(0,224,255,0.06);
    }

    .btn.secondary {
      border-color: rgba(255,255,255,0.1);
      color: #6a6a8a;
    }

    .btn.secondary:hover {
      border-color: rgba(255,255,255,0.25);
      color: #aaaacc;
      box-shadow: none;
    }

    /* ── Responsive ── */
    @media (max-height: 640px) {
      #game-container { gap: 6px; }
      .screen h1 { font-size: 2.8rem; }
      .screen .info { margin-bottom: 1rem; }
    }
  </style>
</head>
<body>

  <!-- ── Start Screen ── -->
  <div id="start-screen" class="screen">
    <h1>2048</h1>
    <p class="subtitle">BrainRot Games</p>
    <p class="info">
      Slide tiles with arrow keys or swipe.<br>
      Match numbers to merge them.<br>
      Reach <strong style="color:#ffd700">2048</strong> to win!
    </p>
    <button class="btn" id="start-btn">START GAME</button>
  </div>

  <!-- ── Win Screen ── -->
  <div id="win-screen" class="screen hidden">
    <h1>2048!</h1>
    <p class="subtitle">You Win</p>
    <p class="final-score">Score: <span id="win-score">0</span></p>
    <div class="btn-row">
      <button class="btn" id="continue-btn">KEEP GOING</button>
      <button class="btn secondary" id="win-new-btn">NEW GAME</button>
    </div>
  </div>

  <!-- ── Game Over Screen ── -->
  <div id="gameover-screen" class="screen hidden">
    <h1>GG</h1>
    <p class="subtitle">Game Over</p>
    <p class="final-score">Final Score: <span id="final-score">0</span></p>
    <button class="btn" id="retry-btn">PLAY AGAIN</button>
  </div>

  <!-- ── Game UI ── -->
  <div id="game-container">
    <div id="header">
      <div id="game-title">2048</div>
      <div id="scores">
        <div class="score-box">
          <div class="score-label">Score</div>
          <div class="score-value" id="score-el">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">Best</div>
          <div class="score-value" id="best-el">0</div>
        </div>
      </div>
    </div>

    <div id="controls">
      <button class="ctrl-btn" id="undo-btn" disabled>↩ UNDO</button>
      <button class="ctrl-btn" id="new-btn">↻ NEW</button>
    </div>

    <div id="grid-wrapper">
      <div id="grid"></div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  // ════════════════════════════════════════
  //  CONSTANTS
  // ════════════════════════════════════════
  const N = 4;
  const SLIDE_MS  = 110;
  const SPAWN_DELAY = SLIDE_MS + 30;

  const PALETTE = {
    2:    { bg:'#141c28', fg:'#5a7088', glow:'none' },
    4:    { bg:'#0a2830', fg:'#00d4ff', glow:'0 0 14px rgba(0,212,255,0.30)' },
    8:    { bg:'#0a1838', fg:'#2090ff', glow:'0 0 16px rgba(32,144,255,0.35)' },
    16:   { bg:'#1c0a40', fg:'#8844ff', glow:'0 0 18px rgba(136,68,255,0.35)' },
    32:   { bg:'#2c0a40', fg:'#cc44ff', glow:'0 0 20px rgba(204,68,255,0.38)' },
    64:   { bg:'#380a20', fg:'#ff3366', glow:'0 0 22px rgba(255,51,102,0.40)' },
    128:  { bg:'#381c08', fg:'#ff8844', glow:'0 0 24px rgba(255,136,68,0.40)' },
    256:  { bg:'#383008', fg:'#ffcc00', glow:'0 0 26px rgba(255,204,0,0.42)' },
    512:  { bg:'#1c3808', fg:'#88ff00', glow:'0 0 26px rgba(136,255,0,0.40)' },
    1024: { bg:'#083828', fg:'#00ff88', glow:'0 0 28px rgba(0,255,136,0.42)' },
    2048: { bg:'#383008', fg:'#ffd700', glow:'0 0 36px rgba(255,215,0,0.55), 0 0 70px rgba(255,180,0,0.18)' },
  };

  function palette(v) {
    return PALETTE[v] || { bg:'#282838', fg:'#ffffff', glow:'0 0 40px rgba(255,255,255,0.45), 0 0 80px rgba(180,80,255,0.25)' };
  }

  function fontSize(v, sz) {
    const d = String(v).length;
    if (d <= 2) return sz * 0.44;
    if (d === 3) return sz * 0.36;
    if (d === 4) return sz * 0.29;
    if (d === 5) return sz * 0.23;
    return sz * 0.19;
  }

  // ════════════════════════════════════════
  //  DOM REFS
  // ════════════════════════════════════════
  const $grid      = document.getElementById('grid');
  const $wrapper   = document.getElementById('grid-wrapper');
  const $scoreEl   = document.getElementById('score-el');
  const $bestEl    = document.getElementById('best-el');
  const $undoBtn   = document.getElementById('undo-btn');
  const $startScr  = document.getElementById('start-screen');
  const $winScr    = document.getElementById('win-screen');
  const $overScr   = document.getElementById('gameover-screen');
  const $winScore  = document.getElementById('win-score');
  const $finalScore= document.getElementById('final-score');

  // ════════════════════════════════════════
  //  STATE
  // ════════════════════════════════════════
  let grid, tiles, nextId;
  let score, best, dispScore, dispBest;
  let active, moving, won, winShown;
  let undoSnap, canUndo;
  let cellSz, gap, pad;
  let animFrame;

  // ════════════════════════════════════════
  //  LAYOUT
  // ════════════════════════════════════════
  function measure() {
    const w = $wrapper.clientWidth;
    pad = Math.max(8, Math.round(w * 0.025));
    gap = Math.max(6, Math.round(w * 0.022));
    cellSz = (w - pad * 2 - gap * (N - 1)) / N;
  }

  function cellXY(r, c) {
    return {
      t: pad + r * (cellSz + gap),
      l: pad + c * (cellSz + gap)
    };
  }

  function drawCells() {
    $grid.querySelectorAll('.cell').forEach(e => e.remove());
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        const d = document.createElement('div');
        d.className = 'cell';
        const p = cellXY(r, c);
        d.style.cssText = `top:${p.t}px;left:${p.l}px;width:${cellSz}px;height:${cellSz}px;border-radius:${Math.round(cellSz*0.08)}px`;
        $grid.appendChild(d);
      }
    }
  }

  // ════════════════════════════════════════
  //  TILE DOM
  // ════════════════════════════════════════
  function styleTile(el, tile) {
    const s = palette(tile.v);
    const p = cellXY(tile.r, tile.c);
    const fs = fontSize(tile.v, cellSz);
    const br = Math.round(cellSz * 0.08);
    el.style.cssText =
      `top:${p.t}px;left:${p.l}px;width:${cellSz}px;height:${cellSz}px;` +
      `background:${s.bg};color:${s.fg};border:1px solid ${s.fg}22;` +
      `box-shadow:${s.glow};font-size:${fs}px;border-radius:${br}px`;
    el.textContent = tile.v;
  }

  function makeTileEl(tile, anim) {
    const el = document.createElement('div');
    el.className = 'tile' + (anim ? ' ' + anim : '');
    styleTile(el, tile);
    $grid.appendChild(el);
    tile.el = el;
    if (anim) setTimeout(() => el.classList.remove(anim), 200);
  }

  function slideTile(tile) {
    const p = cellXY(tile.r, tile.c);
    tile.el.style.top  = p.t + 'px';
    tile.el.style.left = p.l + 'px';
  }

  // ════════════════════════════════════════
  //  CORE LOGIC
  // ════════════════════════════════════════
  function emptyGrid() {
    return Array.from({length: N}, () => Array(N).fill(null));
  }

  function spawn() {
    const open = [];
    for (let r = 0; r < N; r++)
      for (let c = 0; c < N; c++)
        if (!grid[r][c]) open.push([r, c]);
    if (!open.length) return null;
    const [r, c] = open[Math.floor(Math.random() * open.length)];
    const tile = { id: nextId++, v: Math.random() < 0.9 ? 2 : 4, r, c, el: null };
    grid[r][c] = tile;
    tiles.push(tile);
    makeTileEl(tile, 'spawned');
    return tile;
  }

  function snapshot() {
    undoSnap = {
      cells: grid.map(row => row.map(t => t ? t.v : 0)),
      score: score
    };
    canUndo = true;
    $undoBtn.disabled = false;
  }

  // Returns true if anything moved
  function doMove(dir) {
    let dr, dc;
    switch (dir) {
      case 'up':    dr = -1; dc =  0; break;
      case 'down':  dr =  1; dc =  0; break;
      case 'left':  dr =  0; dc = -1; break;
      case 'right': dr =  0; dc =  1; break;
    }

    const rows = [...Array(N).keys()];
    const cols = [...Array(N).keys()];
    if (dr > 0) rows.reverse();
    if (dc > 0) cols.reverse();

    const merged = new Set();
    const ng = emptyGrid();
    let moved = false;
    let pts = 0;
    const merges = [];

    for (const r of rows) {
      for (const c of cols) {
        const tile = grid[r][c];
        if (!tile) continue;

        let nr = r, nc = c;
        while (true) {
          const tr = nr + dr, tc = nc + dc;
          if (tr < 0 || tr >= N || tc < 0 || tc >= N) break;
          const tgt = ng[tr][tc];
          if (!tgt) { nr = tr; nc = tc; }
          else if (tgt.v === tile.v && !merged.has(tgt.id)) { nr = tr; nc = tc; break; }
          else break;
        }

        if (nr !== r || nc !== c) moved = true;

        const existing = ng[nr][nc];
        if (existing && existing.v === tile.v && !merged.has(existing.id)) {
          const nv = tile.v * 2;
          pts += nv;
          merged.add(existing.id);
          existing.v = nv;
          tile.r = nr; tile.c = nc;
          slideTile(tile);
          tile._dead = true;
          tile._into = existing;
          merges.push(existing);
          if (nv >= 2048) won = true;
        } else {
          tile.r = nr; tile.c = nc;
          ng[nr][nc] = tile;
          slideTile(tile);
        }
      }
    }

    if (!moved) return false;
    grid = ng;
    return { pts, merges };
  }

  function gameOver() {
    for (let r = 0; r < N; r++)
      for (let c = 0; c < N; c++) {
        if (!grid[r][c]) return false;
        const v = grid[r][c].v;
        if (c < N-1 && grid[r][c+1] && grid[r][c+1].v === v) return false;
        if (r < N-1 && grid[r+1][c] && grid[r+1][c].v === v) return false;
      }
    return true;
  }

  // ════════════════════════════════════════
  //  MOVE HANDLER
  // ════════════════════════════════════════
  function handleMove(dir) {
    if (!active || moving) return;
    snapshot();

    const result = doMove(dir);
    if (!result) {
      undoSnap = null; canUndo = false; $undoBtn.disabled = true;
      return;
    }

    moving = true;

    setTimeout(() => {
      // Remove dead tiles
      tiles = tiles.filter(t => {
        if (t._dead) { t.el.remove(); return false; }
        return true;
      });

      // Animate merged tiles
      for (const m of result.merges) {
        styleTile(m.el, m);
        m.el.classList.add('merged');
        setTimeout(() => m.el.classList.remove('merged'), 200);
        scorePop(m.r, m.c, m.v);
      }

      // Update score
      if (result.pts) {
        score += result.pts;
        if (score > best) best = score;
        tickScore();
      }

      spawn();
      moving = false;

      // Win?
      if (won && !winShown) {
        winShown = true;
        active = false;
        $winScore.textContent = score;
        $winScr.classList.remove('hidden');
        return;
      }

      // Game over?
      if (gameOver()) {
        active = false;
        setTimeout(() => {
          $finalScore.textContent = score;
          $overScr.classList.remove('hidden');
        }, 250);
      }
    }, SPAWN_DELAY);
  }

  // ════════════════════════════════════════
  //  SCORE ANIMATION
  // ════════════════════════════════════════
  function tickScore() {
    cancelAnimationFrame(animFrame);
    const ts = score, tb = best;
    (function step() {
      let done = true;
      if (dispScore < ts) { dispScore += Math.max(1, Math.ceil((ts - dispScore) * 0.18)); if (dispScore > ts) dispScore = ts; done = false; }
      if (dispBest  < tb) { dispBest  += Math.max(1, Math.ceil((tb - dispBest)  * 0.18)); if (dispBest  > tb) dispBest  = tb; done = false; }
      $scoreEl.textContent = dispScore;
      $bestEl.textContent  = dispBest;
      if (!done) animFrame = requestAnimationFrame(step);
    })();
  }

  function scorePop(r, c, v) {
    const p = cellXY(r, c);
    const el = document.createElement('div');
    el.className = 'score-pop';
    el.textContent = '+' + v;
    el.style.color = palette(v).fg;
    el.style.left = (p.l + cellSz / 2) + 'px';
    el.style.top  = p.t + 'px';
    el.style.transform = 'translateX(-50%)';
    $grid.appendChild(el);
    setTimeout(() => el.remove(), 560);
  }

  // ════════════════════════════════════════
  //  UNDO
  // ════════════════════════════════════════
  function undo() {
    if (!canUndo || !undoSnap || moving) return;
    $grid.querySelectorAll('.tile,.score-pop').forEach(e => e.remove());
    tiles = []; nextId = 0;
    grid = emptyGrid();

    for (let r = 0; r < N; r++)
      for (let c = 0; c < N; c++) {
        const v = undoSnap.cells[r][c];
        if (!v) continue;
        const tile = { id: nextId++, v, r, c, el: null };
        grid[r][c] = tile;
        tiles.push(tile);
        makeTileEl(tile, null);
      }

    score = undoSnap.score;
    dispScore = score;
    $scoreEl.textContent = score;
    canUndo = false;
    $undoBtn.disabled = true;
    undoSnap = null;
    active = true;
  }

  // ════════════════════════════════════════
  //  GAME FLOW
  // ════════════════════════════════════════
  function startGame() {
    $startScr.classList.add('hidden');
    $overScr.classList.add('hidden');
    $winScr.classList.add('hidden');

    measure();
    drawCells();

    $grid.querySelectorAll('.tile,.score-pop').forEach(e => e.remove());
    grid = emptyGrid();
    tiles = [];
    nextId = 0;

    score = 0; dispScore = 0;
    $scoreEl.textContent = '0';
    dispBest = best;
    $bestEl.textContent = best;

    won = false; winShown = false;
    active = true; moving = false;
    canUndo = false; undoSnap = null;
    $undoBtn.disabled = true;

    spawn();
    spawn();
  }

  function continueAfterWin() {
    $winScr.classList.add('hidden');
    active = true;
  }

  // ════════════════════════════════════════
  //  INPUT -- Keyboard
  // ════════════════════════════════════════
  const DIRS = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
                 w:'up', s:'down', a:'left', d:'right' };

  document.addEventListener('keydown', e => {
    const dir = DIRS[e.key];
    if (dir) { e.preventDefault(); handleMove(dir); return; }
    if ((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
  });

  // ════════════════════════════════════════
  //  INPUT -- Touch / Swipe
  // ════════════════════════════════════════
  let tx0, ty0, touching = false;

  document.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    tx0 = e.touches[0].clientX;
    ty0 = e.touches[0].clientY;
    touching = true;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (touching && active) e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (!touching) return;
    touching = false;
    const dx = e.changedTouches[0].clientX - tx0;
    const dy = e.changedTouches[0].clientY - ty0;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) < 25) return;
    handleMove(ax > ay ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
  }, { passive: true });

  // ════════════════════════════════════════
  //  RESIZE
  // ════════════════════════════════════════
  window.addEventListener('resize', () => {
    measure();
    drawCells();
    tiles.forEach(t => styleTile(t.el, t));
  });

  // ════════════════════════════════════════
  //  BUTTON WIRING
  // ════════════════════════════════════════
  document.getElementById('start-btn').onclick   = startGame;
  document.getElementById('continue-btn').onclick = continueAfterWin;
  document.getElementById('win-new-btn').onclick  = startGame;
  document.getElementById('retry-btn').onclick    = startGame;
  document.getElementById('new-btn').onclick      = startGame;
  $undoBtn.onclick = undo;

  // ════════════════════════════════════════
  //  INIT
  // ════════════════════════════════════════
  score = 0; best = 0; dispScore = 0; dispBest = 0;
  active = false; moving = false;
  won = false; winShown = false;
  canUndo = false; undoSnap = null;
  grid = emptyGrid(); tiles = []; nextId = 0;
  measure();
  drawCells();

})();
</script>

</body>
</html>
