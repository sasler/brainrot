<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048 · BrainRot Games</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #050510;
    --surface: #0a0a1a;
    --grid-bg: #0d0d20;
    --cell-bg: #12122a;
    --text: #e0e8f0;
    --text-dim: #6a7a8a;
    --cyan: #00e5ff;
    --teal: #00bfa5;
    --cyan-glow: rgba(0, 229, 255, 0.3);
    --teal-glow: rgba(0, 191, 165, 0.25);
    --gap: clamp(6px, 1.5vmin, 12px);
    --cell-size: clamp(60px, 18vmin, 120px);
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* Screens */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.4s ease, visibility 0.4s ease;
    z-index: 10;
  }
  .screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .screen-title {
    font-size: clamp(3rem, 12vmin, 6rem);
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--cyan), var(--teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px var(--cyan-glow));
    margin-bottom: 0.2em;
  }

  .screen-sub {
    font-size: clamp(0.85rem, 2.5vmin, 1.1rem);
    color: var(--text-dim);
    margin-bottom: 2em;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .btn {
    background: linear-gradient(135deg, var(--cyan), var(--teal));
    color: var(--bg);
    border: none;
    padding: 0.8em 2.4em;
    font-size: clamp(0.95rem, 2.5vmin, 1.15rem);
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
    box-shadow: 0 0 20px var(--cyan-glow);
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 0 35px var(--cyan-glow); }
  .btn:active { transform: scale(0.97); }

  /* Game Container */
  #game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    transition: opacity 0.4s ease;
  }
  #game-container.hidden { opacity: 0; pointer-events: none; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: calc(var(--cell-size) * 4 + var(--gap) * 5);
    max-width: 90vw;
  }

  .game-title {
    font-size: clamp(1.4rem, 4vmin, 2rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--cyan), var(--teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .scores-row {
    display: flex;
    gap: 8px;
  }

  .score-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--surface);
    border: 1px solid rgba(0, 229, 255, 0.15);
    border-radius: 10px;
    padding: 6px 18px;
  }
  .score-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
  }
  .score-value {
    font-size: clamp(1rem, 3vmin, 1.5rem);
    font-weight: 700;
    color: var(--cyan);
    font-variant-numeric: tabular-nums;
  }

  /* Grid */
  .grid-wrapper {
    position: relative;
    background: var(--grid-bg);
    border-radius: var(--radius);
    padding: var(--gap);
    border: 1px solid rgba(0, 229, 255, 0.08);
    box-shadow: 0 0 60px rgba(0, 229, 255, 0.05);
  }

  .grid-bg {
    display: grid;
    grid-template-columns: repeat(4, var(--cell-size));
    grid-template-rows: repeat(4, var(--cell-size));
    gap: var(--gap);
  }

  .cell-bg {
    background: var(--cell-bg);
    border-radius: 8px;
  }

  .tile-layer {
    position: absolute;
    top: var(--gap);
    left: var(--gap);
    width: calc(var(--cell-size) * 4 + var(--gap) * 3);
    height: calc(var(--cell-size) * 4 + var(--gap) * 3);
  }

  /* Tiles */
  .tile {
    position: absolute;
    width: var(--cell-size);
    height: var(--cell-size);
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 800;
    border-radius: 8px;
    transition: top 0.12s ease-in-out, left 0.12s ease-in-out;
    z-index: 1;
  }

  .tile.pop { animation: tilePop 0.2s ease forwards; }
  .tile.merge-pop { animation: mergePop 0.25s ease forwards; z-index: 2; }

  @keyframes tilePop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes mergePop {
    0% { transform: scale(1); }
    40% { transform: scale(1.22); }
    100% { transform: scale(1); }
  }

  /* Tile colors */
  .tile-2    { background: #0e2a30; color: #70e8e8; font-size: clamp(1.4rem, 4vmin, 2.2rem); }
  .tile-4    { background: #0f3038; color: #80f0e0; font-size: clamp(1.4rem, 4vmin, 2.2rem); }
  .tile-8    { background: #0a3a3a; color: #00e5c8; font-size: clamp(1.4rem, 4vmin, 2.2rem); box-shadow: 0 0 12px rgba(0,229,200,0.2); }
  .tile-16   { background: #0a4040; color: #00e5ff; font-size: clamp(1.3rem, 3.5vmin, 2rem); box-shadow: 0 0 16px rgba(0,229,255,0.25); }
  .tile-32   { background: #004a55; color: #00ffd5; font-size: clamp(1.3rem, 3.5vmin, 2rem); box-shadow: 0 0 18px rgba(0,255,213,0.25); }
  .tile-64   { background: #005060; color: #00ffea; font-size: clamp(1.3rem, 3.5vmin, 2rem); box-shadow: 0 0 22px rgba(0,255,234,0.3); }
  .tile-128  { background: #005858; color: #00ffc8; font-size: clamp(1.1rem, 3vmin, 1.7rem); box-shadow: 0 0 25px rgba(0,255,200,0.3); }
  .tile-256  { background: #006060; color: #40ffda; font-size: clamp(1.1rem, 3vmin, 1.7rem); box-shadow: 0 0 28px rgba(64,255,218,0.35); }
  .tile-512  { background: #006858; color: #70ffe0; font-size: clamp(1.1rem, 3vmin, 1.7rem); box-shadow: 0 0 30px rgba(112,255,224,0.35); }
  .tile-1024 { background: #007060; color: #a0ffe8; font-size: clamp(0.9rem, 2.5vmin, 1.35rem); box-shadow: 0 0 35px rgba(160,255,232,0.4); }
  .tile-2048 { background: linear-gradient(135deg, #007a68, #00a89e); color: #fff; font-size: clamp(0.9rem, 2.5vmin, 1.35rem); box-shadow: 0 0 45px rgba(0,229,255,0.5); }
  .tile-super { background: linear-gradient(135deg, #008a78, #00c8b8); color: #fff; font-size: clamp(0.75rem, 2vmin, 1.1rem); box-shadow: 0 0 50px rgba(0,229,255,0.55); }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(5, 5, 16, 0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: var(--radius);
    z-index: 20;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.35s ease, visibility 0.35s ease;
    backdrop-filter: blur(4px);
  }
  .overlay.visible { opacity: 1; visibility: visible; }

  .overlay-title {
    font-size: clamp(1.6rem, 5vmin, 2.5rem);
    font-weight: 800;
    margin-bottom: 0.3em;
    background: linear-gradient(135deg, var(--cyan), var(--teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .overlay-sub {
    color: var(--text-dim);
    font-size: clamp(0.8rem, 2vmin, 1rem);
    margin-bottom: 1.2em;
  }
  .overlay .btn {
    margin: 4px;
    font-size: clamp(0.8rem, 2vmin, 0.95rem);
    padding: 0.6em 1.8em;
  }

  .hint {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen" class="screen">
  <div class="screen-title">2048</div>
  <div class="screen-sub">BrainRot Games</div>
  <button class="btn" id="start-btn">Play</button>
</div>

<!-- Game -->
<div id="game-container" class="hidden">
  <div class="header">
    <div class="game-title">2048</div>
    <div class="scores-row">
      <div class="score-box">
        <span class="score-label">Score</span>
        <span class="score-value" id="score-display">0</span>
      </div>
      <div class="score-box">
        <span class="score-label">Best</span>
        <span class="score-value" id="best-display">0</span>
      </div>
    </div>
  </div>

  <div class="grid-wrapper">
    <div class="grid-bg" id="grid-bg"></div>
    <div class="tile-layer" id="tile-layer"></div>

    <div class="overlay" id="win-overlay">
      <div class="overlay-title">You Win!</div>
      <div class="overlay-sub">You reached 2048</div>
      <div>
        <button class="btn" id="continue-btn">Continue</button>
        <button class="btn" id="win-restart-btn">New Game</button>
      </div>
    </div>

    <div class="overlay" id="gameover-overlay">
      <div class="overlay-title">Game Over</div>
      <div class="overlay-sub" id="final-score-text">Score: 0</div>
      <button class="btn" id="gameover-restart-btn">Try Again</button>
    </div>
  </div>

  <div class="hint">Arrow keys or swipe to play</div>
</div>

<script>
(function () {
  'use strict';

  const SIZE = 4;
  let grid, score, bestScore, won, continued, busy;

  const $ = (id) => document.getElementById(id);
  const startScreen   = $('start-screen');
  const gameContainer = $('game-container');
  const tileLayer     = $('tile-layer');
  const scoreDisplay  = $('score-display');
  const bestDisplay   = $('best-display');
  const winOverlay    = $('win-overlay');
  const gameoverOverlay = $('gameover-overlay');
  const finalScoreText  = $('final-score-text');

  // Build background cells
  const gridBg = $('grid-bg');
  for (let i = 0; i < SIZE * SIZE; i++) {
    const c = document.createElement('div');
    c.className = 'cell-bg';
    gridBg.appendChild(c);
  }

  // Load best score
  try { bestScore = parseInt(localStorage.getItem('2048-best') || '0', 10); } catch(e) {}
  bestDisplay.textContent = bestScore;

  // Compute pixel position for a tile at grid[r][c]
  function cellPos(r, c) {
    const style = getComputedStyle(document.documentElement);
    const gap = parseFloat(style.getPropertyValue('--gap'));
    const cell = parseFloat(style.getPropertyValue('--cell-size'));
    return { left: c * (cell + gap), top: r * (cell + gap) };
  }

  function tileClass(v) {
    return v <= 2048 ? 'tile-' + v : 'tile-super';
  }

  // ── Game lifecycle ──

  function initGame() {
    grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
    score = 0;
    won = false;
    continued = false;
    busy = false;
    scoreDisplay.textContent = '0';
    tileLayer.innerHTML = '';
    winOverlay.classList.remove('visible');
    gameoverOverlay.classList.remove('visible');
    spawnTile();
    spawnTile();
  }

  function spawnTile() {
    const empty = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (!grid[r][c]) empty.push({ r, c });
    if (!empty.length) return;

    const spot = empty[Math.floor(Math.random() * empty.length)];
    const value = Math.random() < 0.9 ? 2 : 4;
    const pos = cellPos(spot.r, spot.c);

    const el = document.createElement('div');
    el.className = 'tile ' + tileClass(value) + ' pop';
    el.textContent = value;
    el.style.left = pos.left + 'px';
    el.style.top = pos.top + 'px';
    tileLayer.appendChild(el);

    grid[spot.r][spot.c] = { value: value, el: el };
  }

  // ── Core move logic ──

  function move(dir) {
    if (busy) return;

    // dir: 0=up 1=right 2=down 3=left
    let moved = false;
    const merges = [];

    const order = (dir === 0 || dir === 3) ? [0,1,2,3] : [3,2,1,0];
    const isHoriz = (dir === 1 || dir === 3);
    const dr = dir === 0 ? -1 : dir === 2 ? 1 : 0;
    const dc = dir === 3 ? -1 : dir === 1 ? 1 : 0;

    for (const major of order) {
      for (const minor of order) {
        const r = isHoriz ? minor : major;
        const c = isHoriz ? major : minor;
        const tile = grid[r][c];
        if (!tile) continue;

        let nr = r, nc = c;
        while (true) {
          const tr = nr + dr, tc = nc + dc;
          if (tr < 0 || tr >= SIZE || tc < 0 || tc >= SIZE) break;
          if (grid[tr][tc]) {
            if (grid[tr][tc].value === tile.value && !grid[tr][tc].merged) {
              nr = tr; nc = tc;
            }
            break;
          }
          nr = tr; nc = tc;
        }

        if (nr === r && nc === c) continue;
        moved = true;

        const target = grid[nr][nc];
        if (target) {
          const newVal = tile.value * 2;
          score += newVal;

          const pos = cellPos(nr, nc);
          tile.el.style.left = pos.left + 'px';
          tile.el.style.top = pos.top + 'px';

          grid[nr][nc] = { value: newVal, el: tile.el, merged: true };
          grid[r][c] = null;
          merges.push({ r: nr, c: nc, oldEl: target.el });
        } else {
          const pos = cellPos(nr, nc);
          tile.el.style.left = pos.left + 'px';
          tile.el.style.top = pos.top + 'px';
          grid[nr][nc] = tile;
          grid[r][c] = null;
        }
      }
    }

    if (!moved) return;
    busy = true;

    setTimeout(function () {
      for (const m of merges) {
        const t = grid[m.r][m.c];
        if (!t) continue;
        if (m.oldEl && m.oldEl.parentNode) m.oldEl.remove();
        t.el.textContent = t.value;
        t.el.className = 'tile ' + tileClass(t.value) + ' merge-pop';
        t.merged = false;
      }

      scoreDisplay.textContent = score;
      if (score > bestScore) {
        bestScore = score;
        bestDisplay.textContent = bestScore;
        try { localStorage.setItem('2048-best', String(bestScore)); } catch(e) {}
      }

      spawnTile();

      if (!won && !continued) {
        for (let r = 0; r < SIZE; r++)
          for (let c = 0; c < SIZE; c++)
            if (grid[r][c] && grid[r][c].value === 2048) {
              won = true;
              winOverlay.classList.add('visible');
            }
      }

      if (!hasMovesLeft()) {
        finalScoreText.textContent = 'Score: ' + score;
        gameoverOverlay.classList.add('visible');
      }

      busy = false;
    }, 130);
  }

  function hasMovesLeft() {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        if (!grid[r][c]) return true;
        var v = grid[r][c].value;
        if (c < SIZE - 1 && grid[r][c+1] && grid[r][c+1].value === v) return true;
        if (r < SIZE - 1 && grid[r+1][c] && grid[r+1][c].value === v) return true;
      }
    return false;
  }

  // ── Keyboard ──
  document.addEventListener('keydown', function (e) {
    var map = { ArrowUp: 0, ArrowRight: 1, ArrowDown: 2, ArrowLeft: 3 };
    if (map[e.key] !== undefined) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  // ── Touch / Swipe ──
  var touchX, touchY;
  document.addEventListener('touchstart', function (e) {
    var t = e.touches[0];
    touchX = t.clientX;
    touchY = t.clientY;
  }, { passive: true });

  document.addEventListener('touchend', function (e) {
    if (touchX == null) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchX;
    var dy = t.clientY - touchY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 30) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      move(dx > 0 ? 1 : 3);
    } else {
      move(dy > 0 ? 2 : 0);
    }
    touchX = touchY = null;
  }, { passive: true });

  // ── Buttons ──
  $('start-btn').addEventListener('click', function () {
    startScreen.classList.add('hidden');
    gameContainer.classList.remove('hidden');
    initGame();
  });

  $('continue-btn').addEventListener('click', function () {
    continued = true;
    winOverlay.classList.remove('visible');
  });

  $('win-restart-btn').addEventListener('click', function () {
    winOverlay.classList.remove('visible');
    initGame();
  });

  $('gameover-restart-btn').addEventListener('click', function () {
    gameoverOverlay.classList.remove('visible');
    initGame();
  });

  // Reposition tiles on resize
  var resizeTimer;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      if (!grid) return;
      for (var r = 0; r < SIZE; r++)
        for (var c = 0; c < SIZE; c++) {
          if (!grid[r][c]) continue;
          var pos = cellPos(r, c);
          grid[r][c].el.style.left = pos.left + 'px';
          grid[r][c].el.style.top = pos.top + 'px';
        }
    }, 100);
  });
})();
</script>
</body>
</html>
